<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <title>VIP 적중 관리 시스템</title>
    <style>
        body { font-family: sans-serif; background: #f4f7f6; padding: 20px; }
        .container { max-width: 800px; margin: 0 auto; background: #fff; padding: 20px; border-radius: 10px; shadow: 0 4px 6px rgba(0,0,0,0.1); }
        table { width: 100%; border-collapse: collapse; margin-top: 20px; }
        th, td { border-bottom: 1px solid #ddd; padding: 12px; text-align: left; }
        .btn { padding: 8px 16px; cursor: pointer; border: none; border-radius: 4px; }
        .btn-write { background: #2563eb; color: white; margin-bottom: 10px; }
        .btn-delete { background: #ef4444; color: white; font-size: 0.8rem; }
        .modal { display: none; position: fixed; top: 50%; left: 50%; transform: translate(-50%, -50%); background: white; padding: 20px; border: 1px solid #ccc; box-shadow: 0 5px 15px rgba(0,0,0,0.3); z-index: 10; width: 400px; }
        input, textarea { width: 100%; margin-bottom: 10px; padding: 8px; box-sizing: border-box; }
    </style>
</head>
<body>

<div class="container">
    <h2>🏆 VIP 적중 결과 관리</h2>
    <button class="btn btn-write" onclick="openModal()">➕ 새 결과 등록</button>
    
    <table>
        <thead>
            <tr>
                <th>날짜</th>
                <th>제목</th>
                <th>관리</th>
            </tr>
        </thead>
        <tbody id="post-list">
            <!-- 글 목록이 여기에 표시됩니다 -->
        </tbody>
    </table>
</div>

<!-- 글쓰기 모달 창 -->
<div id="modal" class="modal">
    <h3>새 적중 결과 작성</h3>
    <input type="date" id="post-date">
    <input type="text" id="post-title" placeholder="제목을 입력하세요 (예: 3월 20일 올킬)">
    <textarea id="post-content" rows="5" placeholder="내용을 입력하세요"></textarea>
    <button class="btn btn-write" onclick="savePost()">저장하기</button>
    <button class="btn" onclick="closeModal()">취소</button>
</div>

<script>
    // 1. 데이터 불러오기
    let posts = JSON.parse(localStorage.getItem('vip_posts')) || [];

    function render() {
        const list = document.getElementById('post-list');
        list.innerHTML = posts.map((post, index) => `
            <tr>
                <td>${post.date}</td>
                <td><strong>${post.title}</strong></td>
                <td><button class="btn btn-delete" onclick="deletePost(${index})">삭제</button></td>
            </tr>
        `).join('');
    }

    // 2. 글 저장하기
    function savePost() {
        const date = document.getElementById('post-date').value;
        const title = document.getElementById('post-title').value;
        const content = document.getElementById('post-content').value;

        if(!date || !title) return alert("날짜와 제목을 입력해주세요!");

        posts.unshift({ date, title, content }); // 최신글을 위로
        localStorage.setItem('vip_posts', JSON.stringify(posts));
        
        closeModal();
        render();
        // 입력창 비우기
        document.getElementById('post-title').value = '';
        document.getElementById('post-content').value = '';
    }

    // 3. 글 삭제하기
    function deletePost(index) {
        if(confirm("정말 삭제하시겠습니까?")) {
            posts.splice(index, 1);
            localStorage.setItem('vip_posts', JSON.stringify(posts));
            render();
        }
    }

    function openModal() { document.getElementById('modal').style.display = 'block'; }
    function closeModal() { document.getElementById('modal').style.display = 'none'; }

    // 초기 실행
    render();
</script>

</body>
</html>
