<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <title>VIP 적중 결과 시스템</title>
    <!-- Firebase SDK 로드 (v9 호환 모드) -->
    <script src="https://www.gstatic.com/firebasejs/9.22.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.1/firebase-database-compat.js"></script>
    <style>
        :root { --primary: #2563eb; --danger: #ef4444; --gray: #64748b; }
        body { font-family: 'Pretendard', sans-serif; background: #f1f5f9; margin: 0; padding: 20px; color: #1e293b; }
        .container { max-width: 900px; margin: 0 auto; background: #fff; padding: 30px; border-radius: 12px; box-shadow: 0 4px 6px -1px rgb(0 0 0 / 0.1); }
        .top-bar { display: flex; justify-content: space-between; align-items: center; margin-bottom: 25px; }
        .btn { padding: 8px 16px; cursor: pointer; border: none; border-radius: 6px; font-weight: 600; transition: 0.2s; text-decoration: none; display: inline-flex; align-items: center; }
        .btn-home { background: #1e293b; color: white; }
        .btn-lang { background: #fff; border: 1px solid #e2e8f0; color: var(--gray); font-size: 0.8rem; margin-left: 5px; }
        .btn-write { background: var(--primary); color: white; margin-bottom: 20px; }
        .btn-edit { background: #f1f5f9; color: var(--gray); font-size: 0.8rem; border: 1px solid #e2e8f0; }
        .btn-delete { background: #fee2e2; color: var(--danger); font-size: 0.8rem; }
        .admin-only { display: none; } 
        table { width: 100%; border-collapse: collapse; }
        th { background: #f8fafc; padding: 12px; text-align: left; border-bottom: 2px solid #e2e8f0; color: var(--gray); font-size: 0.85rem; }
        td { padding: 15px 12px; border-bottom: 1px solid #f1f5f9; }
        .clickable-title { cursor: pointer; color: var(--primary); font-weight: 700; }
        .clickable-title:hover { text-decoration: underline; }
        .modal-overlay { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.5); z-index: 100; align-items: center; justify-content: center; }
        .modal { background: white; padding: 25px; border-radius: 12px; width: 450px; max-width: 90%; }
        input, textarea { width: 100%; margin: 10px 0; padding: 12px; border: 1px solid #e2e8f0; border-radius: 6px; box-sizing: border-box; }
        .modal-footer { display: flex; justify-content: flex-end; gap: 10px; margin-top: 20px; }
        .view-content { white-space: pre-wrap; background: #f8fafc; padding: 15px; border-radius: 6px; border: 1px solid #e2e8f0; margin-top: 10px; min-height: 100px; }
        .btn-admin-login { background: none; color: #cbd5e1; border: none; font-size: 0.7rem; cursor: pointer; margin-top: 50px; width: 100%; }
    </style>
</head>
<body>

<div class="container">
    <div class="top-bar">
        <a href="index.html" class="btn btn-home">🏠 <span data-i18n="goHome">Home</span></a>
        <div>
            <button class="btn btn-lang" onclick="toggleLang()">🌐 KO/EN</button>
            <button class="btn btn-lang admin-only" onclick="adminLogout()" id="logout-btn">🔒 Logout</button>
        </div>
    </div>

    <h2 data-i18n="boardTitle">🏆 VIP 적중 결과</h2>
    <div class="admin-only" id="write-section">
        <button class="btn btn-write" onclick="openWriteModal()">➕ <span data-i18n="addResult">새 결과 등록</span></button>
    </div>
    
    <table>
        <thead>
            <tr>
                <th style="width: 120px;" data-i18n="tableDate">날짜</th>
                <th data-i18n="tableTitle">제목</th>
                <th style="width: 120px; text-align: center;" class="admin-only" data-i18n="tableManage">관리</th>
            </tr>
        </thead>
        <tbody id="post-list"></tbody>
    </table>
    <button class="btn-admin-login" onclick="promptAdmin()">Admin Login</button>
</div>

<!-- 모달 섹션 -->
<div id="modal-overlay" class="modal-overlay">
    <div class="modal">
        <h3 id="modal-header-text"></h3>
        <input type="hidden" id="edit-id">
        <input type="date" id="post-date">
        <input type="text" id="post-title" placeholder="Title">
        <textarea id="post-content" rows="6" placeholder="Content"></textarea>
        <div class="modal-footer">
            <button class="btn" style="background:#e2e8f0;" onclick="closeModal()" data-i18n="btnCancel">취소</button>
            <button class="btn btn-write" id="save-btn" onclick="savePost()" data-i18n="btnSave">저장하기</button>
        </div>
    </div>
</div>

<div id="view-overlay" class="modal-overlay">
    <div class="modal">
        <h3 id="v-title"></h3>
        <p id="v-date" style="font-size: 0.85rem; color: var(--gray);"></p>
        <div class="view-content" id="v-content"></div>
        <div class="modal-footer">
            <button class="btn btn-write" onclick="closeView()" data-i18n="btnConfirm">확인</button>
        </div>
    </div>
</div>

<script>
    // 1. 이미지에서 제공해주신 Firebase 설정값 적용
    const firebaseConfig = {
        apiKey: "AIzaSyCzkJ0xPcCILCnAgNO5JeaVbezjRjMSqPs",
        authDomain: "ai365pick-vip.firebaseapp.com",
        projectId: "ai365pick-vip",
        storageBucket: "ai365pick-vip.firebasestorage.app",
        messagingSenderId: "511678113338",
        appId: "1:511678113338:web:42040a530060295ec1f703",
        databaseURL: "https://ai365pick-vip-default-rtdb.firebaseio.com" // 자동 생성 규칙에 따른 URL 추가
    };

    firebase.initializeApp(firebaseConfig);
    const db = firebase.database();

    // 2. 관리자 및 다국어 설정
    const adminPassword = "1234"; 
    const translations = {
        ko: { goHome: "홈으로", boardTitle: "🏆 VIP 적중 결과", addResult: "새 결과 등록", tableDate: "날짜", tableTitle: "제목", tableManage: "관리", btnEdit: "수정", btnDelete: "삭제", btnSave: "저장하기", btnCancel: "취소", btnConfirm: "확인", modalNew: "새 결과 등록", modalEdit: "게시글 수정", msgConfirmDelete: "정말 삭제하시겠습니까?", msgAlertInput: "모든 항목을 입력해주세요!", msgAdminSuccess: "관리자 모드 활성화", msgAdminFail: "비밀번호가 틀렸습니다." },
        en: { goHome: "Home", boardTitle: "🏆 VIP Hits", addResult: "Add New Result", tableDate: "Date", tableTitle: "Title", tableManage: "Action", btnEdit: "Edit", btnDelete: "Delete", btnSave: "Save", btnCancel: "Cancel", btnConfirm: "OK", modalNew: "New Result", modalEdit: "Edit Post", msgConfirmDelete: "Are you sure?", msgAlertInput: "Fill in all fields!", msgAdminSuccess: "Admin mode active", msgAdminFail: "Wrong password." }
    };

    let currentLang = localStorage.getItem('lang') || 'ko';
    let isAdmin = sessionStorage.getItem('isAdmin') === 'true';
    let posts = {};

    // 3. 실시간 데이터 리스너
    db.ref('vip_posts').on('value', (snapshot) => {
        posts = snapshot.val() || {};
        render();
    });

    function render() {
        const list = document.getElementById('post-list');
        const t = translations[currentLang];
        let html = '';
        
        const sortedKeys = Object.keys(posts).sort((a, b) => {
            return new Date(posts[b].date) - new Date(posts[a].date);
        });
        
        sortedKeys.forEach(key => {
            const post = posts[key];
            html += `
                <tr>
                    <td style="color: var(--gray); font-size: 0.9rem;">${post.date}</td>
                    <td><span class="clickable-title" onclick="viewPost('${key}')">${post.title}</span></td>
                    ${isAdmin ? `
                    <td style="display: flex; gap: 5px; justify-content: center;">
                        <button class="btn btn-edit" onclick="openEditModal('${key}')">${t.btnEdit}</button>
                        <button class="btn btn-delete" onclick="deletePost('${key}')">${t.btnDelete}</button>
                    </td>` : ''}
                </tr>`;
        });
        list.innerHTML = html || '<tr><td colspan="3" style="text-align:center;">No results found.</td></tr>';
        checkAdminStatus();
    }

    // 4. 데이터 조작 함수
    function savePost() {
        const date = document.getElementById('post-date').value;
        const title = document.getElementById('post-title').value;
        const content = document.getElementById('post-content').value;
        const editId = document.getElementById('edit-id').value;

        if(!date || !title || !content) return alert(translations[currentLang].msgAlertInput);

        const postData = { date, title, content };

        if(editId === "") {
            db.ref('vip_posts').push(postData);
        } else {
            db.ref('vip_posts/' + editId).set(postData);
        }
        closeModal();
    }

    function deletePost(key) {
        if(confirm(translations[currentLang].msgConfirmDelete)) {
            db.ref('vip_posts/' + key).remove();
        }
    }

    // 5. UI 제어 함수
    function viewPost(key) {
        const post = posts[key];
        document.getElementById('v-title').innerText = post.title;
        document.getElementById('v-date').innerText = (currentLang === 'ko' ? "날짜: " : "Date: ") + post.date;
        document.getElementById('v-content').innerText = post.content;
        document.getElementById('view-overlay').style.display = 'flex';
    }

    function openWriteModal() {
        document.getElementById('modal-header-text').innerText = translations[currentLang].modalNew;
        document.getElementById('edit-id').value = "";
        document.getElementById('post-date').value = "";
        document.getElementById('post-title').value = "";
        document.getElementById('post-content').value = "";
        document.getElementById('modal-overlay').style.display = 'flex';
    }

    function openEditModal(key) {
        const post = posts[key];
        document.getElementById('modal-header-text').innerText = translations[currentLang].modalEdit;
        document.getElementById('edit-id').value = key;
        document.getElementById('post-date').value = post.date;
        document.getElementById('post-title').value = post.title;
        document.getElementById('post-content').value = post.content;
        document.getElementById('modal-overlay').style.display = 'flex';
    }

    function checkAdminStatus() {
        const adminElements = document.querySelectorAll('.admin-only');
        adminElements.forEach(el => {
            const displayType = (el.tagName === 'TH' || el.tagName === 'TD') ? 'table-cell' : 'block';
            el.style.display = isAdmin ? displayType : 'none';
        });
    }

    function promptAdmin() {
        const pass = prompt("Admin Password?");
        if(pass === adminPassword) {
            isAdmin = true;
            sessionStorage.setItem('isAdmin', 'true');
            checkAdminStatus();
            render();
        }
    }

    function adminLogout() {
        isAdmin = false;
        sessionStorage.removeItem('isAdmin');
        checkAdminStatus();
        render();
    }

    function toggleLang() {
        currentLang = currentLang === 'ko' ? 'en' : 'ko';
        localStorage.setItem('lang', currentLang);
        updateLanguage();
    }

    function updateLanguage() {
        const t = translations[currentLang];
        document.querySelectorAll('[data-i18n]').forEach(el => {
            const key = el.getAttribute('data-i18n');
            if (t[key]) el.innerText = t[key];
        });
        render();
    }

    function closeModal() { document.getElementById('modal-overlay').style.display = 'none'; }
    function closeView() { document.getElementById('view-overlay').style.display = 'none'; }
