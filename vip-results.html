<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI365PICK - VIP 적중 결과</title>
    <!-- Firebase 라이브러리 -->
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-database.js"></script>
    <style>
        body { font-family: sans-serif; margin: 0; background-color: #f4f7f9; }
        /* 핵심: 화면 크기 제한 및 중앙 정렬 */
        .container { 
            max-width: 800px; 
            margin: 0 auto; 
            background: #fff; 
            min-height: 100vh; 
            padding: 20px;
            box-sizing: border-box;
        }
        .header { display: flex; justify-content: space-between; align-items: center; border-bottom: 2px solid #eee; padding-bottom: 15px; }
        .post-item { padding: 20px; border-bottom: 1px solid #f0f0f0; transition: background 0.2s; }
        .post-item:hover { background: #fafafa; }
        .post-title { font-size: 1.1rem; font-weight: bold; color: #1e293b; }
        .post-date { font-size: 0.85rem; color: #94a3b8; margin-top: 5px; }
        #loading { text-align: center; padding: 50px; color: #666; }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h2 style="margin:0;">🏆 VIP 적중 결과</h2>
            <button onclick="location.href='index.html'" style="cursor:pointer; padding:8px 15px; border-radius:5px; border:1px solid #ddd; background:#fff;">홈으로</button>
        </div>

        <div id="loading">데이터를 불러오는 중입니다...</div>
        <div id="post-list"></div>

        <div style="margin-top:50px; text-align:center;">
            <button onclick="promptAdmin()" style="border:none; background:none; color:#eee; cursor:pointer; font-size:10px;">Admin Login</button>
        </div>
    </div>

    <script>
        const firebaseConfig = {
            apiKey: "AIzaSyCzkJ0xPcCILCnAgNO5JeaVbezjRjMSqPs",
            databaseURL: "https://ai365pick-vip-default-rtdb.firebaseio.com",
            projectId: "ai365pick-vip",
            appId: "1:511678113338:web:42040a530060295ec1f703"
        };
        if (!firebase.apps.length) firebase.initializeApp(firebaseConfig);
        const db = firebase.database();

        // 실시간 데이터 감시
        db.ref('vip_posts').on('value', (snapshot) => {
            document.getElementById('loading').style.display = 'none';
            const list = document.getElementById('post-list');
            const data = snapshot.val();

            if (data) {
                let html = '';
                // 최신글이 위로 오도록 역순 정렬
                Object.values(data).reverse().forEach(item => {
                    html += `
                        <div class="post-item">
                            <div class="post-title">${item.title}</div>
                            <div style="margin-top:8px;">${item.content}</div>
                            <div class="post-date">${item.date}</div>
                        </div>`;
                });
                list.innerHTML = html;
            } else {
                list.innerHTML = '<p style="text-align:center; padding:50px; color:#999;">등록된 결과가 없습니다.</p>';
            }
        });

        function promptAdmin() {
            const pw = prompt("관리자 암호를 입력하세요.");
            if(pw === "1234") {
                sessionStorage.setItem('isAdmin', 'true');
                alert("인증되었습니다. 이제 수정 권한이 부여됩니다.");
                location.reload();
            }
        }
    </script>
</body>
</html>
