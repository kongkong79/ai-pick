<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI365PICK - VIP 적중 결과</title>
    <!-- Firebase Legacy SDK (가장 안정적임) -->
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-database.js"></script>
    <style>
        /* 기존 스타일 유지 */
        body { font-family: 'Pretendard', sans-serif; margin: 0; padding: 0; background: #fff; }
        .container { max-width: 800px; margin: 20px auto; padding: 20px; }
        .header { display: flex; justify-content: space-between; align-items: center; padding: 15px; border-bottom: 1px solid #eee; }
        .post-item { padding: 15px; border-bottom: 1px solid #f9f9f9; cursor: pointer; display: flex; justify-content: space-between; }
        .admin-btn-area { margin-top: 10px; display: none; }
        .active { display: block !important; }
        /* 로딩 표시기 */
        #loading { text-align: center; padding: 50px; color: #999; }
    </style>
</head>
<body>

<div class="header">
    <strong>🏆 VIP 적중 결과</strong>
    <button onclick="location.href='index.html'" style="cursor:pointer;">홈으로</button>
</div>

<div class="container">
    <div id="admin-controls" class="admin-btn-area">
        <button onclick="openModal()" style="background:#2563eb; color:#fff; border:none; padding:10px; border-radius:5px; cursor:pointer;">+ 새 결과 등록</button>
        <button onclick="adminLogout()" style="margin-left:10px;">로그아웃</button>
    </div>

    <div id="loading">데이터를 불러오는 중입니다...</div>
    <div id="post-list"></div>
    
    <div style="margin-top:100px; text-align:center;">
        <button onclick="promptAdmin()" style="background:none; border:none; color:#eee; font-size:10px; cursor:pointer;">Admin Login</button>
    </div>
</div>

<script>
    // 1. Firebase 설정
    const firebaseConfig = {
        apiKey: "AIzaSyCzkJ0xPcCILCnAgNO5JeaVbezjRjMSqPs",
        authDomain: "ai365pick-vip.firebaseapp.com",
        projectId: "ai365pick-vip",
        databaseURL: "https://ai365pick-vip-default-rtdb.firebaseio.com",
        storageBucket: "ai365pick-vip.appspot.com",
        messagingSenderId: "511678113338",
        appId: "1:511678113338:web:42040a530060295ec1f703"
    };

    // Firebase 초기화 (중복 초기화 방지)
    if (!firebase.apps.length) {
        firebase.initializeApp(firebaseConfig);
    }
    const db = firebase.database();

    let isAdmin = sessionStorage.getItem('isAdmin') === 'true';

    // 2. 관리자 UI 체크
    function checkAdmin() {
        const controls = document.getElementById('admin-controls');
        if (isAdmin) controls.classList.add('active');
        else controls.classList.remove('active');
    }

    // 3. 데이터 가져오기 (실시간)
    db.ref('vip_posts').on('value', (snapshot) => {
        const list = document.getElementById('post-list');
        const loading = document.getElementById('loading');
        loading.style.display = 'none'; // 로딩 메시지 숨김
        
        const data = snapshot.val();
        let html = '';

        if (data) {
            // 날짜순 정렬하여 출력
            const keys = Object.keys(data).reverse();
            keys.forEach(key => {
                const item = data[key];
                html += `
                    <div class="post-item" onclick="alert('${item.content}')">
                        <span>${item.title}</span>
                        <span style="color:#999; font-size:12px;">${item.date}</span>
                    </div>
                `;
            });
            list.innerHTML = html;
        } else {
            list.innerHTML = '<p style="text-align:center; color:#ccc;">등록된 결과가 없습니다.</p>';
        }
        checkAdmin();
    });

    // 4. 관리자 로그인 함수
    function promptAdmin() {
        const pw = prompt("관리자 비밀번호를 입력하세요.");
        if (pw === "1234") { // 비밀번호 설정
            sessionStorage.setItem('isAdmin', 'true');
            isAdmin = true;
            checkAdmin();
            location.reload(); // 화면 갱신
        } else {
            alert("비밀번호가 틀렸습니다.");
        }
    }

    function adminLogout() {
        sessionStorage.removeItem('isAdmin');
        isAdmin = false;
        location.reload();
    }
</script>

</body>
</html>
