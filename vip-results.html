<!-- VIP 적중 게시판 (리스트형) -->
<div id="board-container" style="max-width: 800px; margin: 30px auto; background: #fff; border-radius: 12px; box-shadow: 0 4px 15px rgba(0,0,0,0.1); overflow: hidden; font-family: sans-serif;">
    
    <!-- 게시판 헤더 -->
    <div style="background: #f8fafc; padding: 15px 20px; border-bottom: 2px solid #2563eb; display: flex; justify-content: space-between; align-items: center;">
        <h3 style="margin: 0; color: #1e293b;">🏆 VIP 적중 게시판</h3>
        <span style="font-size: 0.8rem; color: #64748b;">AI365PICK Official</span>
    </div>

    <!-- 1. 목록 화면 (List View) -->
    <div id="post-list-view">
        <table style="width: 100%; border-collapse: collapse; text-align: left;">
            <thead>
                <tr style="background: #f1f5f9; font-size: 0.85rem; color: #475569;">
                    <th style="padding: 12px 20px; width: 60px;">번호</th>
                    <th style="padding: 12px 20px;">제목</th>
                    <th style="padding: 12px 20px; width: 100px;">날짜</th>
                    <th style="padding: 12px 20px; width: 80px;">결과</th>
                </tr>
            </thead>
            <tbody id="board-body">
                <!-- 스크립트가 여기에 목록을 생성합니다 -->
            </tbody>
        </table>
    </div>

    <!-- 2. 상세 화면 (Detail View) - 기본적으로 숨김 -->
    <div id="post-detail-view" style="display: none; padding: 25px;">
        <button onclick="showList()" style="cursor: pointer; background: #f1f5f9; border: 1px solid #cbd5e1; padding: 5px 12px; border-radius: 5px; margin-bottom: 20px;">← 목록으로</button>
        <h2 id="detail-title" style="margin-bottom: 10px; font-size: 1.4rem;"></h2>
        <div id="detail-date" style="color: #94a3b8; font-size: 0.85rem; margin-bottom: 20px; border-bottom: 1px solid #f1f5f9; padding-bottom: 10px;"></div>
        <div id="detail-content">
            <img id="detail-img" src="" style="width: 100%; border-radius: 10px; margin-bottom: 20px;">
            <p id="detail-text" style="line-height: 1.7; color: #334155; white-space: pre-wrap;"></p>
        </div>
    </div>
</div>

<script>
    // [글쓰기 관리] 새로운 결과가 나오면 이 배열의 맨 위에 추가하세요.
    const posts = [
        {
            id: 2,
            title: "3월 18일 VIP 픽 2경기 올킬 적중 내역",
            date: "2024-03-18",
            result: "HIT",
            img: "img/hit_0318.png",
            content: "어제 추천드린 VIP 콤보가 모두 적중했습니다.\n\n[경기 1] 4:0 대승 완료\n[경기 2] 3:2 접전 승리 완료\n\nAI 분석대로 완벽한 결과가 나왔습니다. 수익 축하드립니다!"
        },
        {
            id: 1,
            title: "3월 17일 VIP 주말 경기 분석 적중",
            date: "2024-03-17",
            result: "HIT",
            img: "img/hit_0317.png",
            content: "주말 VIP 데이터 분석 결과입니다.\n안정적인 수익 구간을 확보하며 마무리되었습니다."
        }
    ];

    function renderBoard() {
        const boardBody = document.getElementById('board-body');
        boardBody.innerHTML = posts.map(post => `
            <tr onclick="showDetail(${post.id})" style="border-bottom: 1px solid #f1f5f9; cursor: pointer; transition: 0.2s; hover: background: #f8fafc;">
                <td style="padding: 15px 20px; font-size: 0.9rem; color: #94a3b8;">${post.id}</td>
                <td style="padding: 15px 20px; font-weight: 500; color: #1e293b;">${post.title}</td>
                <td style="padding: 15px 20px; font-size: 0.85rem; color: #64748b;">${post.date}</td>
                <td style="padding: 15px 20px;"><span style="color: #ef4444; font-weight: bold; font-size: 0.8rem;">${post.result}</span></td>
            </tr>
        `).join('');
    }

    function showDetail(id) {
        const post = posts.find(p => p.id === id);
        if (!post) return;

        document.getElementById('detail-title').innerText = post.title;
        document.getElementById('detail-date').innerText = "작성일: " + post.date;
        document.getElementById('detail-img').src = post.img;
        document.getElementById('detail-text').innerText = post.content;

        document.getElementById('post-list-view').style.display = 'none';
        document.getElementById('post-detail-view').style.display = 'block';
    }

    function showList() {
        document.getElementById('post-list-view').style.display = 'block';
        document.getElementById('post-detail-view').style.display = 'none';
    }

    // 초기 실행
    renderBoard();
</script>
