<!DOCTYPE html>
<html lang="en" data-theme="light">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI365PICK - Smart AI Sports Analysis</title>
    <link rel="stylesheet" href="style.css">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
    <style>
        .vip-combo-card { transition: transform 0.3s ease; }
        .vip-combo-card:hover { transform: translateY(-5px); }
        .analysis-list-item { border: 1px solid var(--header-border); border-radius: 12px; padding: 20px; margin-bottom: 15px; background: var(--card-bg); }
        .subscribe-button { display: inline-block; margin-top: 10px; padding: 8px 20px; background: #2563eb; color: white; border-radius: 5px; text-decoration: none; font-weight: bold; }
    </style>
</head>
<body>
    <header>
        <div class="container">
            <a href="#" class="logo-link" id="logo-link" style="text-decoration:none; color:inherit; display:flex; align-items:center; gap:10px;">
                 <img src="betmetrics.png" alt="Logo" class="logo-img" style="width:40px; height:40px;">
                 <span class="logo-main-text" style="font-weight:bold; font-size:1.2rem;">AI365PICK</span>
            </a>
            <nav>
                <a href="index.html" class="nav-link active" data-i18n-key="navHome">Home</a>
                <a href="vip.html" class="nav-link vip-link" data-i18n-key="navVip">VIP</a>
            </nav>
            <div class="header-controls">
                <div id="language-switcher">
                    <button class="lang-btn" data-lang="en">EN</button>
                    <button class="lang-btn" data-lang="ko">KO</button>
                </div>
                <button id="theme-toggle">☀️</button>
            </div>
        </div>
    </header>

    <main class="container">
        <section class="hero" style="text-align:center; padding: 40px 0;">
            <h1 data-i18n-key="heroTitle">Real-time AI Sports Analysis</h1>
            <p data-i18n-key="heroSub">Harness the power of AI 365 days a year.</p>
        </section>

        <div id="vip-combo-container"></div>
        
        <div id="loading-indicator" style="text-align: center; padding: 20px; display:none;">Loading...</div>
        
        <div id="analysis-list"></div>
    </main>

    <script>
        document.addEventListener('DOMContentLoaded', () => {
            const ADMIN_PASSWORD = 'MGB_ADMIN_2024';
            let logoClickCount = 0;
            let logoClickTimer = null;
            let currentLang = localStorage.getItem('language') || 'en';

            async function init() {
                const savedTheme = localStorage.getItem('theme') || 'light';
                document.documentElement.setAttribute('data-theme', savedTheme);
                fetchDataAndRender();
                setupEventListeners();
            }

            async function fetchDataAndRender() {
                const analysisList = document.getElementById('analysis-list');
                const comboContainer = document.getElementById('vip-combo-container');
                const loadingIndicator = document.getElementById('loading-indicator');
                
                if (loadingIndicator) loadingIndicator.style.display = 'block';
                analysisList.innerHTML = '';
                if (comboContainer) comboContainer.innerHTML = '';

                try {
                    // 데이터 버그 수정을 위한 캐시 방지 fetch
                    const response = await fetch('sports_data.xlsx?v=' + new Date().getTime());
                    if (!response.ok) throw new Error('Excel file not found.');

                    const arrayBuffer = await response.arrayBuffer();
                    const workbook = XLSX.read(new Uint8Array(arrayBuffer), { type: 'array' });
                    const worksheet = workbook.Sheets[workbook.SheetNames[0]];
                    const jsonData = XLSX.utils.sheet_to_json(worksheet, { header: 1 });

                    // 원본 로직: 데이터 파싱
                    const allMatches = jsonData.slice(1).map(row => {
                        if (!row[1]) return null; // 팀명이 없으면 무시
                        let hitRate = 0;
                        let rawHit = row[5]; 
                        if (typeof rawHit === 'string') {
                            hitRate = parseFloat(rawHit.replace('%', '')) / 100;
                        } else {
                            hitRate = parseFloat(rawHit) > 1 ? rawHit / 100 : rawHit;
                        }

                        return {
                            time: row[0],
                            home: row[1],
                            away: row[2],
                            match: `${row[1]} vs ${row[2]}`,
                            prediction: row[4],
                            odds: parseFloat(row[3]) || 0,
                            hitRate: hitRate || 0,
                            roi: parseFloat(row[10]) || 0,
                            sampleSize: parseInt(row[11]) || 0
                        };
                    }).filter(item => item !== null);

                    // 원본 로직: 필터링 조건 (ROI 1.0 이상, 표본 10개 이상)
                    const filteredMatches = allMatches.filter(item => {
                        const hasValidPick = item.prediction && item.prediction !== '-' && item.prediction.trim() !== '';
                        return hasValidPick && item.roi >= 1.0 && item.sampleSize >= 10;
                    });

                    // [VIP 3배 조합 생성 로직]
                    const isVip = localStorage.getItem('isVipUser') === 'true';
                    if (isVip && comboContainer) {
                        renderVipCombo(filteredMatches, comboContainer);
                    }

                    if (filteredMatches.length === 0) {
                        analysisList.innerHTML = `<p style="text-align:center; padding:2rem;">No matches found matching the criteria.</p>`;
                    } else {
                        filteredMatches.forEach(item => {
                            analysisList.appendChild(createMatchCard(item, isVip));
                        });
                    }

                } catch (error) {
                    console.error('Data Load Error:', error);
                    analysisList.innerHTML = `<p style="text-align:center; color:red;">Failed to load data. (${error.message})</p>`;
                } finally {
                    if (loadingIndicator) loadingIndicator.style.display = 'none';
                }
            }

            function renderVipCombo(matches, container) {
                const candidates = matches.filter(m => m.hitRate >= 0.70 && m.odds >= 1.4 && m.odds <= 2.2);
                let bestCombo = null;
                let closestToTarget = 999;

                for (let i = 0; i < candidates.length; i++) {
                    for (let j = i + 1; j < candidates.length; j++) {
                        const totalOdds = candidates[i].odds * candidates[j].odds;
                        const diff = Math.abs(totalOdds - 3.0);
                        if (totalOdds >= 2.7 && totalOdds <= 3.6 && diff < closestToTarget) {
                            closestToTarget = diff;
                            bestCombo = [candidates[i], candidates[j], totalOdds];
                        }
                    }
                }

                if (bestCombo) {
                    const [m1, m2, finalOdds] = bestCombo;
                    container.innerHTML = `
                        <div class="vip-combo-card" style="background: linear-gradient(135deg, #1e3a8a, #2563eb); color: white; padding: 25px; border-radius: 15px; margin-bottom: 25px; box-shadow: 0 10px 20px rgba(37,99,235,0.3);">
                            <div style="text-align:center; margin-bottom:15px;">
                                <span style="background:rgba(255,255,255,0.2); padding:4px 12px; border-radius:20px; font-size:0.8rem; font-weight:bold;">VIP STRATEGY</span>
                                <h2 style="margin:10px 0; font-size:1.4rem;">🎯 Today's High-Prob Combo</h2>
                            </div>
                            <div style="display:grid; grid-template-columns: 1fr 1fr; gap:15px; border-top:1px solid rgba(255,255,255,0.2); padding-top:15px;">
                                <div style="background:rgba(255,255,255,0.1); padding:12px; border-radius:8px;">
                                    <div style="font-size:0.75rem; opacity:0.8;">Match 1</div>
                                    <div style="font-weight:bold; margin:5px 0;">${m1.match}</div>
                                    <div style="color:#4ade80; font-weight:bold;">${m1.prediction}</div>
                                </div>
                                <div style="background:rgba(255,255,255,0.1); padding:12px; border-radius:8px;">
                                    <div style="font-size:0.75rem; opacity:0.8;">Match 2</div>
                                    <div style="font-weight:bold; margin:5px 0;">${m2.match}</div>
                                    <div style="color:#4ade80; font-weight:bold;">${m2.prediction}</div>
                                </div>
                            </div>
                            <div style="text-align:center; margin-top:20px; font-size:1.3rem; font-weight:bold;">
                                Expected Return: <span style="color:#facc15;">${finalOdds.toFixed(2)}x</span>
                            </div>
                        </div>`;
                }
            }

            function createMatchCard(item, isVip) {
                const card = document.createElement('div');
                card.className = 'analysis-list-item';
                
                // VIP 유저일 경우 스타일 차별화
                if (isVip) {
                    card.style.borderColor = '#2563eb';
                    card.style.background = '#f8faff';
                }

                // VIP 잠금 로직 (적중률 80% 이상인데 VIP가 아닌 경우)
                if (item.hitRate >= 0.80 && !isVip) {
                    card.innerHTML = `
                        <div style="text-align:center; padding:20px;">
                            <div style="font-size: 2rem; margin-bottom: 10px;">🔒</div>
                            <h3 style="margin-bottom:5px;">VIP Exclusive Match</h3>
                            <p style="font-size:0.85rem; color:#888; margin-bottom:15px;">This high-probability match (Hit Rate: ${(item.hitRate*100).toFixed(0)}%) is for VIP members.</p>
                            <a href="vip.html" class="subscribe-button">Unlock with VIP</a>
                        </div>`;
                } else {
                    const isHighRate = item.hitRate >= 0.80;
                    card.innerHTML = `
                        <div style="display:flex; justify-content:space-between; align-items:flex-start; margin-bottom:10px;">
                            <div>
                                <strong style="font-size:1.1rem; display:block;">${isHighRate ? '⭐ ' : ''}${item.match}</strong>
                                <span style="font-size:0.8rem; color:gray;">🕒 ${item.time || 'TBD'}</span>
                            </div>
                            <span style="background:#e2e8f0; padding:2px 8px; border-radius:4px; font-size:0.75rem;">Sample: ${item.sampleSize}</span>
                        </div>
                        <div style="background:rgba(0,0,0,0.03); padding:15px; border-radius:10px;">
                            <p style="margin:5px 0;"><strong>Pick:</strong> <span style="color:#2563eb; font-weight:bold;">${item.prediction}</span></p>
                            <p style="margin:5px 0;"><strong>Odds:</strong> ${item.odds.toFixed(2)} | <strong>Hit Rate:</strong> ${(item.hitRate*100).toFixed(0)}%</p>
                        </div>
                        ${isHighRate ? '<div style="margin-top:10px; font-size:0.75rem; color:#2563eb; font-weight:bold;">✅ Premium VIP Analysis Unlocked</div>' : ''}
                    `;
                }
                return card;
            }

            function setupEventListeners() {
                // 테마 토글
                document.getElementById('theme-toggle')?.addEventListener('click', () => {
                    const currentTheme = document.documentElement.getAttribute('data-theme');
                    const newTheme = currentTheme === 'dark' ? 'light' : 'dark';
                    document.documentElement.setAttribute('data-theme', newTheme);
                    localStorage.setItem('theme', newTheme);
                    document.getElementById('theme-toggle').innerText = newTheme === 'light' ? '☀️' : '🌙';
                });

                // 언어 스위처
                document.getElementById('language-switcher')?.addEventListener('click', (e) => {
                    if (e.target.tagName === 'BUTTON') {
                        const lang = e.target.getAttribute('data-lang');
                        localStorage.setItem('language', lang);
                        location.reload(); // 원본 로직 유지 (안전한 반영)
                    }
                });

                // [중요] 로고 5번 클릭 관리자 모드 로직
                document.getElementById('logo-link')?.addEventListener('click', (e) => {
                    e.preventDefault();
                    logoClickCount++;
                    clearTimeout(logoClickTimer);
                    logoClickTimer = setTimeout(() => { logoClickCount = 0; }, 2000);
                    
                    if (logoClickCount === 5) {
                        const pw = prompt('Admin Password?');
                        if (pw === ADMIN_PASSWORD) {
                            localStorage.setItem('isVipUser', 'true');
                            alert('Admin Mode: VIP Unlocked');
                            location.reload();
                        }
                        logoClickCount = 0;
                    }
                });
            }

            init();
        });
    </script>
</body>
</html>
