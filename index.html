<!DOCTYPE html>
<html lang="en" data-theme="light">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI365PICK - Smart AI Sports Analysis</title>
    <link rel="stylesheet" href="style.css">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
    <style>
        .high-accuracy-card { border: 2px solid #22c55e !important; background-color: #f0fdf4; position: relative; }
        .hot-badge { background: #22c55e; color: white; position: absolute; top: 10px; right: 10px; padding: 3px 10px; border-radius: 20px; font-size: 10px; font-weight: bold; }
        #debug-info { font-size: 10px; color: #ccc; text-align: center; margin-top: 20px; }
    </style>
</head>
<body>
    <header>
        <div class="container">
            <a href="index.html" class="logo-link">
                 <img src="betmetrics.png" alt="Logo" class="logo-img" onerror="this.style.display='none'">
                 <span class="logo-main-text">AI365PICK</span>
            </a>
            <div class="header-controls">
                <div id="language-switcher">
                    <button class="lang-btn" data-lang="en">EN</button>
                    <button class="lang-btn" data-lang="ko">KO</button>
                </div>
                <button id="theme-toggle">☀️</button>
            </div>
        </div>
    </header>

    <main class="container">
        <section class="hero">
            <h1 data-i18n="heroTitle">Real-time AI Sports Analysis</h1>
            <p data-i18n="heroSub">Harness the power of AI 365 days a year.</p>
        </section>
        
        <div id="loading-indicator" style="text-align: center; padding: 20px;">Loading...</div>
        <div id="analysis-list"></div>
        <div id="debug-info"></div> </main>

    <script>
        const translations = {
            en: { heroTitle: "Real-time AI Sports Analysis", heroSub: "AI Insights 365 Days", unlock: "Unlock VIP", sample: "Sample", pick: "Pick", highAcc: "HIGH ACCURACY" },
            ko: { heroTitle: "실시간 AI 스포츠 분석", heroSub: "365일 인공지능 분석 데이터", unlock: "VIP 열기", sample: "표본", pick: "추천", highAcc: "적중률 높음" }
        };

        let currentLang = localStorage.getItem('selectedLang') || 'en';

        async function renderAnalysis() {
            const container = document.getElementById('analysis-list');
            const loader = document.getElementById('loading-indicator');
            const debug = document.getElementById('debug-info');
            const t = translations[currentLang];
            
            loader.style.display = 'block';
            
            try {
                // 파일 읽기 시도
                const response = await fetch('sports_data.xlsx?v=' + Date.now());
                if (!response.ok) throw new Error('File not found (404)');

                const arrayBuffer = await response.arrayBuffer();
                const data = new Uint8Array(arrayBuffer);
                const workbook = XLSX.read(data, {type: 'array'});
                const sheet = workbook.Sheets[workbook.SheetNames[0]];
                const rows = XLSX.utils.sheet_to_json(sheet, {header: 1});

                debug.innerText = "Rows found: " + rows.length; // 디버깅용

                const dataRows = rows.slice(1).filter(row => row[1] && row[2]);
                container.innerHTML = '';

                if (dataRows.length === 0) {
                    container.innerHTML = '<p style="text-align:center;">No data in Excel file.</p>';
                    return;
                }

                dataRows.forEach(row => {
                    const hitRate = parseFloat(row[5]) || 0;
                    const winP = parseFloat(row[6]) || 0;
                    const drawP = parseFloat(row[7]) || 0;
                    const lossP = parseFloat(row[8]) || 0;
                    
                    const card = document.createElement('div');
                    card.className = `analysis-list-item ${hitRate >= 70 ? 'high-accuracy-card' : ''}`;
                    card.innerHTML = `
                        <div style="font-size:0.7rem; color:#888;">🕒 ${row[0] || ''} | ${t.sample}: ${row[11] || 0}</div>
                        <h3 style="margin:10px 0;">${row[1]} vs ${row[2]}</h3>
                        <div style="color:#2563eb; font-weight:bold;">${t.pick}: ${row[4] || '-'} (${row[3] || ''})</div>
                        <div style="margin-top:10px; font-size:0.8rem;">Hit Rate: ${hitRate}%</div>
                        <div style="height:5px; width:100%; background:#eee; margin-top:5px;">
                            <div style="height:100%; width:${winP}%; background:#2563eb; float:left;"></div>
                        </div>
                    `;
                    container.appendChild(card);
                });

            } catch (e) {
                console.error(e);
                container.innerHTML = `<p style="text-align:center; color:red;">Error: ${e.message}</p>`;
            } finally {
                loader.style.display = 'none';
            }
        }

        // 언어 변경 및 초기 실행
        function init() {
            document.querySelectorAll('.lang-btn').forEach(btn => {
                btn.addEventListener('click', () => {
                    currentLang = btn.getAttribute('data-lang');
                    localStorage.setItem('selectedLang', currentLang);
                    location.reload(); // 언어 변경 시 안전하게 새로고침
                });
            });
            renderAnalysis();
        }

        // 테마 토글
        document.getElementById('theme-toggle').onclick = () => {
            const isDark = document.documentElement.getAttribute('data-theme') === 'dark';
            document.documentElement.setAttribute('data-theme', isDark ? 'light' : 'dark');
            localStorage.setItem('theme', isDark ? 'light' : 'dark');
        };

        window.onload = init;
    </script>
</body>
</html>
