<!DOCTYPE html>
<html lang="ko" data-theme="light">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI365PICK - Smart AI Sports Analysis</title>
    <link rel="stylesheet" href="style.css">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
    <style>
        /* 기본 스타일 유지 */
        :root { --header-border: #e2e8f0; --card-bg: #ffffff; --primary-blue: #2563eb; }
        [data-theme='dark'] { --header-border: #334155; --card-bg: #1e293b; }
        .analysis-list-item { border: 1px solid var(--header-border); border-radius: 12px; padding: 20px; margin-bottom: 15px; background: var(--card-bg); }
        .subscribe-button { display: inline-block; padding: 10px 20px; background: var(--primary-blue); color: white; border-radius: 8px; text-decoration: none; font-weight: bold; }
        .lang-btn { cursor: pointer; border: none; background: none; font-size: 0.9rem; transition: 0.3s; }
    </style>
</head>
<body>
    <header style="border-bottom: 1px solid var(--header-border); padding: 15px 0;">
        <div class="container" style="display:flex; justify-content:space-between; align-items:center; max-width:1200px; margin:0 auto; padding:0 20px;">
            <a href="index.html" id="logo-link" style="text-decoration:none; color:inherit; display:flex; align-items:center; gap:10px;">
                 <img src="betmetrics.png" alt="Logo" style="width:35px; height:35px;">
                 <span style="font-weight:bold; font-size:1.3rem;">AI365PICK</span>
            </a>
            <div class="header-controls" style="display:flex; align-items:center; gap:15px;">
                <div id="language-switcher">
                    <button class="lang-btn" data-lang="ko" onclick="changeLang('ko')">KO</button>
                    <span style="color:#ccc">|</span>
                    <button class="lang-btn" data-lang="en" onclick="changeLang('en')">EN</button>
                </div>
                <button id="theme-toggle" style="background:none; border:none; font-size:1.2rem; cursor:pointer;">☀️</button>
            </div>
        </div>
    </header>

    <main class="container" style="max-width:800px; margin:0 auto; padding:40px 20px;">
        <section style="text-align:center; margin-bottom: 40px;">
            <h1 id="txt-hero-title" style="font-size:2rem; margin-bottom:10px;">실시간 AI 스포츠 분석</h1>
            <p id="txt-hero-sub" style="color:#64748b;">빅데이터 기반 AI가 365일 정교한 예측을 제공합니다.</p>
        </section>

        <div id="loading-indicator" style="text-align: center; padding: 30px;">데이터 분석 중...</div>
        <div id="analysis-list"></div>
    </main>

    <script>
        // 1. 번역 데이터 객체
        const translations = {
            ko: {
                heroTitle: "실시간 AI 스포츠 분석",
                heroSub: "빅데이터 기반 AI가 365일 정교한 예측을 제공합니다.",
                loading: "데이터 분석 중...",
                aiPick: "AI 추천",
                sample: "표본수",
                odds: "배당",
                vipLock: "🔒 VIP 전용 분석",
                vipDesc: "승률 85% 이상의 VIP 전용 경기입니다.",
                vipBtn: "VIP 전용 픽 확인하기",
                noData: "현재 기준을 충족하는 경기가 없습니다."
            },
            en: {
                heroTitle: "Real-time AI Analysis",
                heroSub: "AI provides precise predictions based on Big Data.",
                loading: "Analyzing Data...",
                aiPick: "AI Pick",
                sample: "Sample",
                odds: "Odds",
                vipLock: "🔒 VIP Exclusive",
                vipDesc: "This is a VIP match with 85%+ win rate.",
                vipBtn: "Unlock VIP Picks",
                noData: "No matches found."
            }
        };

        let currentLang = localStorage.getItem('lang') || 'ko';

        document.addEventListener('DOMContentLoaded', () => {
            initApp();
        });

        function initApp() {
            updateUI();
            fetchDataAndRender();
            setupTheme();
        }

        // 언어 변경 함수
        function changeLang(lang) {
            currentLang = lang;
            localStorage.setItem('lang', lang);
            updateUI();
            fetchDataAndRender(); // 리스트 다시 그리기
        }

        // 정적 텍스트 업데이트
        function updateUI() {
            const t = translations[currentLang];
            document.getElementById('txt-hero-title').innerText = t.heroTitle;
            document.getElementById('txt-hero-sub').innerText = t.heroSub;
            document.getElementById('loading-indicator').innerText = t.loading;

            // 버튼 강조 스타일
            document.querySelectorAll('.lang-btn').forEach(btn => {
                btn.style.fontWeight = btn.dataset.lang === currentLang ? "bold" : "normal";
                btn.style.opacity = btn.dataset.lang === currentLang ? "1" : "0.5";
            });
        }

        async function fetchDataAndRender() {
            const analysisList = document.getElementById('analysis-list');
            const isVipUser = localStorage.getItem('isVipUser') === 'true';
            const t = translations[currentLang];

            try {
                const response = await fetch('today_ai_all_picks.xlsx?v=' + Date.now());
                if (!response.ok) throw new Error('File not found');
                const arrayBuffer = await response.arrayBuffer();
                const workbook = XLSX.read(new Uint8Array(arrayBuffer), { type: 'array' });
                const jsonData = XLSX.utils.sheet_to_json(workbook.Sheets[workbook.SheetNames[0]]);

                analysisList.innerHTML = '';
                const validMatches = jsonData.filter(row => (parseFloat(row['예상확률']) || 0) >= 70);

                if (validMatches.length === 0) {
                    analysisList.innerHTML = `<p style="text-align:center; padding:3rem;">${t.noData}</p>`;
                    return;
                }

                validMatches.forEach(row => {
                    const hitRate = parseFloat(row['예상확률']) || 0;
                    const isVipMatch = hitRate >= 85;
                    const card = document.createElement('div');
                    card.className = 'analysis-list-item';

                    if (isVipMatch && !isVipUser) {
                        // VIP 잠금 상태 UI
                        card.innerHTML = `
                            <div style="text-align:center;">
                                <h3 style="margin-bottom:5px;">${row['홈팀']} vs ${row['원정팀']}</h3>
                                <p style="color:#2563eb; font-weight:bold;">${t.vipLock}</p>
                                <p style="font-size:0.85rem; color:#64748b; margin-bottom:15px;">${t.vipDesc}</p>
                                <a href="vip.html" class="subscribe-button">${t.vipBtn}</a>
                            </div>`;
                    } else {
                        // 일반 공개 UI
                        card.innerHTML = `
                            <div style="display:flex; justify-content:space-between; margin-bottom:10px;">
                                <strong>${row['홈팀']} vs ${row['원정팀']}</strong>
                                <span style="color:#2563eb; font-weight:bold;">${hitRate.toFixed(1)}%</span>
                            </div>
                            <div style="background:#f8fafc; padding:15px; border-radius:10px;">
                                <p><strong>${t.aiPick}:</strong> ${row['AI추천']}</p>
                                <div style="font-size:0.8rem; color:#64748b;">
                                    ${t.odds}: ${row['홈승배당']} / ${row['무승부배당']} / ${row['원정승배당']} | ${t.sample}: ${row['총경기수']}
                                </div>
                            </div>`;
                    }
                    analysisList.appendChild(card);
                });
            } catch (err) {
                analysisList.innerHTML = '<p>Error loading data.</p>';
            } finally {
                document.getElementById('loading-indicator').style.display = 'none';
            }
        }

        function setupTheme() {
            const toggle = document.getElementById('theme-toggle');
            toggle.addEventListener('click', () => {
                const theme = document.documentElement.getAttribute('data-theme') === 'dark' ? 'light' : 'dark';
                document.documentElement.setAttribute('data-theme', theme);
                localStorage.setItem('theme', theme);
                toggle.innerText = theme === 'light' ? '☀️' : '🌙';
            });
        }
    </script>
</body>
</html>
