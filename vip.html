<script>
const VIP_CODE = "FEB888";

function kst(t) {
    if (!t || t==='-' || t==='None' || t==='nan') return '--:--';
    const num = parseFloat(t);
    if (!isNaN(num) && !String(t).includes(':')) {
        const totalMin = Math.round(num*24*60);
        const h = Math.floor(totalMin/60)%24;
        const m = totalMin%60;
        return String(h).padStart(2,'0')+':'+String(m).padStart(2,'0');
    }
    try {
        const parts = String(t).split(':');
        if (parts.length < 2) return '--:--';
        const h = parseInt(parts[0]) % 24;   // 27시→03시, 28시→04시 변환
        const m = parseInt(parts[1]);
        if (isNaN(h)||isNaN(m)) return '--:--';
        return String(h).padStart(2,'0')+':'+String(m).padStart(2,'0');
    } catch(e) { return '--:--'; }
}

function sv(v) {
    if (v===null||v===undefined||['None','nan','-',''].includes(String(v))) return '-';
    const f = parseFloat(v);
    return isNaN(f) ? String(v) : f.toFixed(1);
}

function simGrid(row) {

    return `
    <div class="sim-grid">
      <div class="sim-cell"><div class="sim-label">홈승 실적</div><div class="sim-val green">${sv(row['유사_홈승실적'])}%</div></div>

}

                합산 배당률: <span style="font-size:1.6rem;color:#facc15;font-weight:900;">${totalOdds}x</span>
              </div>
            </div>`;
        } else {
            comboDiv.innerHTML = '';
        }

        // ── 승무패 강추 섹션 ──────────────────────────────────────────
        if (picks1x2.length > 0) {
            sec1x2.innerHTML =
                `<div class="section-header" style="background:linear-gradient(135deg,#92400e,#f59e0b);">🔥 승무패 강추 픽 (${picks1x2.length}경기)</div>` +
                picks1x2.map(r => render1x2Card(r)).join('');
        } else {
            sec1x2.innerHTML = `<div style="text-align:center;padding:20px;color:#94a3b8;background:var(--card-bg);border-radius:12px;margin-bottom:16px;">오늘 승무패 강추 경기 없음</div>`;
        }

        // ── 오버2.5 강추 섹션 ─────────────────────────────────────────
        if (picksOver.length > 0) {
            secOver.innerHTML =
                `<div class="section-header" style="background:linear-gradient(135deg,#0c4a6e,#0ea5e9);">⚡ 오버2.5 강추 픽 (${picksOver.length}경기)</div>` +
                picksOver.map(r => renderOverCard(r)).join('');
        } else {
            secOver.innerHTML = `<div style="text-align:center;padding:20px;color:#94a3b8;background:var(--card-bg);border-radius:12px;">오늘 오버2.5 강추 경기 없음</div>`;
        }

    } catch(e) {
        sec1x2.innerHTML = `<p style="color:red;text-align:center;">오류: ${e.message}</p>`;
    }
}

function verifyVipCode() {
    if (document.getElementById('vip-code-input').value.trim() === VIP_CODE) {
        localStorage.setItem('isVipUser','true');
        location.reload();
    } else { alert("코드가 틀렸습니다."); }
}
function logoutVip() { localStorage.removeItem('isVipUser'); location.reload(); }

function checkStatus() {
    const isVip = localStorage.getItem('isVipUser') === 'true';
    document.getElementById('vip-locked-section').style.display   = isVip ? 'none'  : 'block';
    document.getElementById('vip-unlocked-section').style.display = isVip ? 'block' : 'none';
    if (isVip) initVipPage();
}

const setTheme = t => {
    document.documentElement.setAttribute('data-theme', t);
    localStorage.setItem('theme', t);
};
document.addEventListener('DOMContentLoaded', () => {
    checkStatus();
    setTheme(localStorage.getItem('theme')||'light');
});
</script>
</body>
</html>
