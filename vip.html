        [data-theme='dark'] .kr-payment-box { background: #0f172a; border-color: #334155; }

        .summary-table { width: 100%; border-collapse: collapse; }

<script>
    const translations = {

            vipLockTitle: "⭐ VIP 프리미엄 회원", vipLockSub: "VIP 전용 분석 데이터",
            vipLockDesc: "배당 가치가 높은 AI 엄선 VIP 픽을 확인하세요.",
            subscribeBtn: "해외 카드 결제 ($9.99)",

            noVip: "⚠️ 오늘 조건에 맞는 VIP 경기가 없습니다. 일반 고확률 픽을 참고하세요.",
            hcapInfo: "(0 핸디캡 추천)",
            vipWelcome: "✅ VIP 멤버 전용 구역", listTitle: "🔥 오늘의 AI 엄선 VIP 추천픽",
            comboTitle: "오늘의 AI VIP 추천 조합", totalOdds: "합산 배당률",
            download: "📥 엑셀 다운로드", sample: "표본", 
            homeWin: "홈승", draw: "무승부", awayWin: "원정승"
        },
        en: {
            home: "Home", vip: "VIP",
            vipLockTitle: "⭐ VIP Premium Member", vipLockSub: "VIP Exclusive Analysis",
            vipLockDesc: "Access our AI-selected high value VIP picks.",
            subscribeBtn: "Subscribe Now ($9.99)",
            alreadyCode: "Already have a code?", verifyBtn: "Verify",
            noVip: "⚠️ No VIP matches meet the criteria today.",
            hcapInfo: "(0 Handicap Recommended)",
            vipWelcome: "✅ VIP Member Zone", listTitle: "🔥 Today's AI Selected VIP Picks",
            comboTitle: "Today's AI VIP Combo", totalOdds: "Total Odds",
            download: "📥 Download Excel", sample: "Sample", 
            homeWin: "Home Win", draw: "Draw", awayWin: "Away Win"
        }
    };

    let currentLang = localStorage.getItem('lang') || 'ko';
    const VIP_CODE = "FEB888";

    function changeLang(lang) {
        currentLang = lang;
        localStorage.setItem('lang', lang);
        updateUI();
        if (localStorage.getItem('isVipUser') === 'true') initVipPage();
    }

    function updateUI() {
        const t = translations[currentLang];
        document.getElementById('nav-home').innerText = t.home;
        document.getElementById('nav-vip').innerText = t.vip;
        if(document.getElementById('txt-vip-lock-title')) {
            document.getElementById('txt-vip-lock-title').innerText = t.vipLockTitle;
            document.getElementById('txt-vip-lock-sub').innerText = t.vipLockSub;
            document.getElementById('txt-vip-lock-desc').innerText = t.vipLockDesc;
            document.getElementById('btn-subscribe').innerText = t.subscribeBtn;
            document.getElementById('txt-already-code').innerText = t.alreadyCode;
            document.getElementById('btn-verify').innerText = t.verifyBtn;
        }
        if(document.getElementById('txt-vip-welcome')) document.getElementById('txt-vip-welcome').innerText = t.vipWelcome;
        if(document.getElementById('txt-list-title')) document.getElementById('txt-list-title').innerText = t.listTitle;
        if(document.getElementById('btn-download')) document.getElementById('btn-download').innerText = t.download;

        const krSection = document.getElementById('kr-only-payment');
        if(krSection) krSection.style.display = currentLang === 'ko' ? 'block' : 'none';
    }

    function translatePick(pickText) {
        const t = translations[currentLang];
        if (pickText.includes("홈승")) return t.homeWin;
        if (pickText.includes("무승부")) return t.draw;
        if (pickText.includes("원정승")) return t.awayWin;
        return pickText;
    }

    async function initVipPage() {
        const tbody = document.getElementById('vip-data-body');
        const comboDiv = document.getElementById('vip-combo-display');
        const noticeArea = document.getElementById('notice-area');
        const t = translations[currentLang];

        try {
            const response = await fetch('today_ai_all_picks.xlsx?v=' + Date.now());
            const arrayBuffer = await response.arrayBuffer();
            const workbook = XLSX.read(new Uint8Array(arrayBuffer), { type: 'array' });
            const jsonData = XLSX.utils.sheet_to_json(workbook.Sheets[workbook.SheetNames[0]]);

            // [핵심 로직] 1. 홈승 추천 2. Forebet 무승부 예측 3. 홈정배
            const vipMatches = jsonData.filter(row => {
                const isHomePick = row['AI추천'] === '홈승';
                const isHomeFavorite = row['정배위치'] === '홈정배';
                
                const forebetScore = row['Forebet_예상점수'] || "";
                const scores = forebetScore.split(':').map(s => parseInt(s.trim()));
                const isForebetDraw = scores.length === 2 && scores[0] === scores[1];

                return isHomePick && isHomeFavorite && isForebetDraw;
            });

            if (vipMatches.length === 0) {
                noticeArea.innerHTML = `<div class="notice-banner">${t.noVip}</div>`;
                comboDiv.innerHTML = ""; 
            } else {
                noticeArea.innerHTML = "";
                if (vipMatches.length >= 2) {
                    const m1 = vipMatches[0]; const m2 = vipMatches[1];
                    const odds1 = parseFloat(m1['홈승배당']) || 1;
                    const odds2 = parseFloat(m2['홈승배당']) || 1;
                    const totalOdds = (odds1 * odds2).toFixed(2);

                    comboDiv.innerHTML = `
                        <div class="vip-combo-card">
                            <div style="text-align:center; margin-bottom:15px;">
                                <h2 style="margin:0; font-size:1.3rem;">${t.comboTitle}</h2>
                                <p style="font-size:0.75rem; color:#fde68a; margin-top:5px;">[Forebet 무승부 예측 + AI 분석 홈승 조합]</p>
                            </div>
