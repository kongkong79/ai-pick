<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI365PICK - VIP Membership</title>
    <style>
        /* 기본 스타일 초기화 */
        body { 
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; 
            margin: 0; 
            padding: 0; 
            background-color: #f8fafc; 
            color: #1e293b;
            line-height: 1.6;
        }

        /* 결과 페이지와 동일한 너비 제한 레이아웃 */
        .container { 
            max-width: 800px; 
            margin: 0 auto; 
            background: #ffffff; 
            min-height: 100vh; 
            padding: 40px 20px;
            box-sizing: border-box;
            box-shadow: 0 0 20px rgba(0,0,0,0.05);
            text-align: center;
        }

        .vip-badge {
            display: inline-block;
            background: #ffe4e6;
            color: #e11d48;
            padding: 5px 15px;
            border-radius: 20px;
            font-weight: bold;
            font-size: 0.9rem;
            margin-bottom: 20px;
        }

        h1 { font-size: 2rem; margin-bottom: 20px; letter-spacing: -1px; }
        
        .description { 
            color: #64748b; 
            font-size: 1.1rem; 
            margin-bottom: 40px; 
        }

        .benefit-card {
            background: #f1f5f9;
            border-radius: 15px;
            padding: 25px;
            margin-bottom: 30px;
            text-align: left;
        }

        .benefit-item {
            display: flex;
            align-items: center;
            gap: 10px;
            margin-bottom: 10px;
        }

        /* 강조 버튼 */
        .cta-button {
            display: block;
            background: #2563eb;
            color: white;
            text-decoration: none;
            padding: 18px;
            border-radius: 12px;
            font-weight: bold;
            font-size: 1.2rem;
            transition: transform 0.2s;
        }

        .cta-button:hover { transform: scale(1.02); }

        .back-link {
            display: inline-block;
            margin-top: 30px;
            color: #94a3b8;
            text-decoration: none;
            font-size: 0.9rem;
        }
    </style>
</head>
<body>

    <div class="container">
        <div class="vip-badge">PREMIUM SERVICE</div>
        <h1>💎 VIP 전용 프리미엄 분석</h1>
        
        <p class="description">
            일반 사용자에게 제공되지 않는 <br>
            <strong>승률 85% 이상의 초고확률 픽</strong>을 실시간으로 확인하세요.
        </p>

        <div class="benefit-card">
            <div class="benefit-item">✅ AI 딥러닝 기반 정밀 필터링</div>
            <div class="benefit-item">✅ 고배당 적중률 극대화 전략</div>
            <div class="benefit-item">✅ VIP 전용 실시간 알림 서비스</div>
        </div>

        <a href="https://t.me/your_telegram_id" class="cta-button">
            VIP 멤버십 가입 문의하기 (Telegram)
        </a>

        <a href="index.html" class="back-link">← 메인 화면으로 돌아가기</a>
    </div>

</body>
</html>
