<!DOCTYPE html>
<html lang="ko" data-theme="light">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>VIP Access - AI365PICK</title>
    <link rel="stylesheet" href="style.css?v=110">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
    <style>
        :root { --header-border: #e2e8f0; --card-bg: #ffffff; --primary-blue: #2563eb; --text-muted: #64748b; }
        [data-theme='dark'] { --header-border: #334155; --card-bg: #1e293b; --card-text: #f1f5f9; --text-muted: #94a3b8; }
        body { font-family: -apple-system, sans-serif; margin: 0; background: var(--card-bg); color: inherit; }
        .container { max-width: 900px; margin: 0 auto; padding: 0 20px; }
        
        header { border-bottom: 1px solid var(--header-border); padding: 15px 0; background: var(--card-bg); position: sticky; top: 0; z-index: 100; }
        .header-inner { display: flex; justify-content: space-between; align-items: center; }
        .nav-menu { display: flex; gap: 20px; font-weight: bold; }
        .nav-link { text-decoration: none; color: #64748b; font-size: 0.95rem; }
        .nav-link.active { color: var(--primary-blue); }

        .notice-banner { background: #fffbeb; border: 1px solid #fde68a; color: #92400e; padding: 15px; border-radius: 10px; margin-bottom: 20px; font-weight: bold; text-align: center; font-size: 0.9rem; }
        [data-theme='dark'] .notice-banner { background: #451a03; border-color: #78350f; color: #fde68a; }

        .summary-card { margin: 20px auto; background: var(--card-bg); border-radius: 12px; box-shadow: 0 4px 6px rgba(0,0,0,0.1); overflow: hidden; border: 1px solid var(--header-border); }
        .summary-header { background: var(--primary-blue); color: white; padding: 15px; font-weight: bold; display: flex; justify-content: space-between; align-items: center; }
        .summary-table { width: 100%; border-collapse: collapse; }
        .summary-table td { padding: 15px 10px; text-align: center !important; border-bottom: 1px solid var(--header-border); }
        
        .vip-combo-card { background: linear-gradient(135deg, #1e3a8a, #2563eb); color: white; padding: 25px; border-radius: 15px; box-shadow: 0 4px 15px rgba(37,99,235,0.3); border: 2px solid #facc15; margin-bottom: 30px; width: 100%; box-sizing: border-box; }
        
        .time-badge { background: #f1f5f9; padding: 3px 8px; border-radius: 6px; font-size: 0.75rem; color: #2563eb; margin-right: 8px; font-weight: bold; border: 1px solid #e2e8f0; }
        [data-theme='dark'] .time-badge { background: #0f172a; color: #60a5fa; border-color: #334155; }

        .lock-card { max-width: 500px; margin: 40px auto; border: 2px solid #fbbf24; padding: 30px; border-radius: 15px; background: var(--card-bg); text-align: center; }
        button.verify-btn { padding: 12px 20px; background: #2563eb; color: white; border: none; border-radius: 8px; cursor: pointer; font-weight: bold; }
    </style>
</head>
<body>
    <header>
        <div class="container header-inner">
            <a href="index.html" style="text-decoration:none; color:inherit; display:flex; align-items:center; gap:8px;">
                 <img src="betmetrics.png" alt="Logo" style="width:30px; height:30px;">
                 <span style="font-weight:900; font-size:1.2rem;">AI365PICK</span>
            </a>
            <nav class="nav-menu">
                <a href="index.html" class="nav-link">Home</a>
                <a href="vip.html" class="nav-link active">VIP</a>
            </nav>
        </div>
    </header>

    <main class="container" style="padding-top: 20px;">
        <section id="vip-locked-section" style="display: none; padding: 40px 0;">
            <div class="lock-card">
                <div style="font-size: 50px; margin-bottom: 15px;">🔒</div>
                <h3>VIP 전용 분석 구역</h3>
                <p>배당 가치가 높은 AI 엄선 VIP 픽을 확인하세요.</p>
                <input type="text" id="vip-code-input" placeholder="인증 코드 입력" style="padding: 12px; width: 60%; border-radius: 8px; border: 1px solid #ccc; margin-bottom: 10px;">
                <button onclick="verifyVipCode()" class="verify-btn">인증하기</button>
            </div>
        </section>

        <section id="vip-unlocked-section" style="display: none;">
            <div id="notice-area"></div> 
            <h1 style="color: #2563eb; text-align:center; margin-bottom: 30px;">✅ VIP Member Zone</h1>
            
            <div id="vip-combo-display"></div>

            <div class="summary-card">
                <div class="summary-header">
                    <span>🔥 오늘의 AI 엄선 VIP 추천픽 (한국 시간 기준)</span>
                </div>
                <table class="summary-table">
                    <tbody id="vip-data-body">
                        <tr><td colspan="3" style="padding:50px;">데이터를 불러오는 중...</td></tr>
                    </tbody>
                </table>
            </div>
            
            <div style="text-align: center; margin: 30px 0;">
                <button onclick="logoutVip()" style="color: gray; background: none; border: none; text-decoration: underline; cursor: pointer;">Logout</button>
            </div>
        </section>
    </main>

<script>
    const VIP_CODE = "FEB888";

    // 시간 변환 함수 (GMT/UTC -> KST +9시간)
    function convertToKST(timeStr) {
        if (!timeStr || !timeStr.includes(':')) return "--:--";
        try {
            let [hours, minutes] = timeStr.split(':').map(Number);
            let totalHours = hours + 9;
            
            // 24시간 형식 유지
            let kstHours = totalHours % 24;
            // 숫자가 1자리면 앞에 0 붙이기
            let h = String(kstHours).padStart(2, '0');
            let m = String(minutes).padStart(2, '0');
            
            return `${h}:${m}`;
        } catch (e) {
            return timeStr;
        }
    }

    async function initVipPage() {
        const tbody = document.getElementById('vip-data-body');
        const comboDiv = document.getElementById('vip-combo-display');
        const noticeArea = document.getElementById('notice-area');

        try {
            const response = await fetch('today_ai_all_picks.xlsx?v=' + Date.now());
            if (!response.ok) throw new Error();
            const arrayBuffer = await response.arrayBuffer();
            const workbook = XLSX.read(new Uint8Array(arrayBuffer), { type: 'array' });
            const jsonData = XLSX.utils.sheet_to_json(workbook.Sheets[workbook.SheetNames[0]]);

            const vipMatches = jsonData.filter(row => {
                const isHomePick = String(row['AI추천'] || "").includes('홈승');
                const isHomeFavorite = String(row['정배위치'] || "").includes('홈정배');
                const forebetScore = String(row['Forebet_예상점수'] || "");
                const scoreParts = forebetScore.replace(/\s/g, '').split(/[:\-]/);
                const isForebetDraw = scoreParts.length === 2 && scoreParts[0] === scoreParts[1] && scoreParts[0] !== "";
                return isHomePick && isHomeFavorite && isForebetDraw;
            });

            const displayMatches = vipMatches.length > 0 ? vipMatches : 
                jsonData.filter(row => (parseFloat(row['예상확률']) >= 80)).slice(0, 15);

            if (vipMatches.length === 0) {
                noticeArea.innerHTML = `<div class="notice-banner">⚠️ 조건에 맞는 VIP 경기가 없어 고확률 추천픽으로 대체됩니다. (시간은 한국 기준)</div>`;
            }

            if (displayMatches.length >= 2) {
                const m1 = displayMatches[0]; const m2 = displayMatches[1];
                const totalOdds = ((parseFloat(m1['홈승배당']) || 1) * (parseFloat(m2['홈승배당']) || 1)).toFixed(2);
                
                comboDiv.innerHTML = `
                    <div class="vip-combo-card">
                        <h3 style="text-align:center; margin-top:0;">VIP 추천 조합</h3>
                        <div style="display:flex; justify-content:space-around; text-align:center;">
                            <div>
                                <div style="font-size:0.75rem; opacity:0.9;">[${convertToKST(m1['시간'])}]</div>
                                <b>${m1['홈팀']}</b><br><span style="color:#facc15;">${m1['AI추천']}</span>
                            </div>
                            <div style="font-size:1.5rem; align-self:center;">×</div>
                            <div>
                                <div style="font-size:0.75rem; opacity:0.9;">[${convertToKST(m2['시간'])}]</div>
                                <b>${m2['홈팀']}</b><br><span style="color:#facc15;">${m2['AI추천']}</span>
                            </div>
                        </div>
                        <div style="text-align:center; margin-top:20px; font-weight:bold; border-top:1px solid rgba(255,255,255,0.2); padding-top:10px;">
                            합산 배당률: <span style="font-size:1.5rem; color:#facc15;">${totalOdds}x</span>
                        </div>
                    </div>`;
            }

            let html = '';
            displayMatches.forEach(row => {
                const kstTime = convertToKST(row['시간']);
                html += `
                    <tr>
                        <td style="text-align:left !important; padding-left: 20px;">
                            <span class="time-badge">KST ${kstTime}</span>
                            <span style="font-weight:bold;">${row['홈팀']} vs ${row['원정팀']}</span>
                        </td>
                        <td style="color:#2563eb; font-weight:bold;">${row['AI추천']}</td>
                        <td style="color:#059669; font-weight:bold;">${parseFloat(row['예상확률'] || 0).toFixed(1)}%</td>
                    </tr>`;
            });
            tbody.innerHTML = html || '<tr><td colspan="3">데이터가 없습니다.</td></tr>';

        } catch (e) {
            tbody.innerHTML = '<tr><td colspan="3">데이터 로드 실패</td></tr>';
        }
    }

    function verifyVipCode() {
        if (document.getElementById('vip-code-input').value.trim() === VIP_CODE) {
            localStorage.setItem('isVipUser', 'true');
            location.reload();
        } else { alert("코드가 틀렸습니다."); }
    }

    function checkStatus() {
        const isVip = localStorage.getItem('isVipUser') === 'true';
        document.getElementById('vip-locked-section').style.display = isVip ? 'none' : 'block';
        document.getElementById('vip-unlocked-section').style.display = isVip ? 'block' : 'none';
        if (isVip) initVipPage();
    }

    function logoutVip() { localStorage.removeItem('isVipUser'); location.reload(); }
    checkStatus();
</script>
</body>
</html>
