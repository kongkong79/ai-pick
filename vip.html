<!DOCTYPE html>
<html lang="ko" data-theme="light">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>VIP Access - AI365PICK</title>
    <link rel="stylesheet" href="style.css?v=110">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
    <style>
        :root { --header-border: #e2e8f0; --card-bg: #ffffff; --primary-blue: #2563eb; --text-muted: #64748b; }
        [data-theme='dark'] { --header-border: #334155; --card-bg: #1e293b; --card-text: #f1f5f9; --text-muted: #94a3b8; }
        body { font-family: -apple-system, sans-serif; margin: 0; background: var(--card-bg); color: inherit; }
        .container { max-width: 900px; margin: 0 auto; padding: 0 20px; }
        header { border-bottom: 1px solid var(--header-border); padding: 15px 0; background: var(--card-bg); position: sticky; top: 0; z-index: 100; }
        .header-inner { display: flex; justify-content: space-between; align-items: center; }
        .nav-menu { display: flex; gap: 20px; font-weight: bold; }
        .nav-link { text-decoration: none; color: #64748b; font-size: 0.95rem; }
        .nav-link.active { color: var(--primary-blue); }

        /* 공지사항 스타일 */
        .notice-banner { background: #fffbeb; border: 1px solid #fde68a; color: #92400e; padding: 15px; border-radius: 10px; margin-bottom: 20px; font-weight: bold; text-align: center; }
        [data-theme='dark'] .notice-banner { background: #451a03; border-color: #78350f; color: #fde68a; }

        .summary-card { margin: 20px auto; background: var(--card-bg); border-radius: 12px; box-shadow: 0 4px 6px rgba(0,0,0,0.1); overflow: hidden; border: 1px solid var(--header-border); }
        .summary-header { background: var(--primary-blue); color: white; padding: 15px; font-weight: bold; display: flex; justify-content: space-between; align-items: center; }
        .summary-table { width: 100%; border-collapse: collapse; }
        .summary-table td { padding: 15px 10px; text-align: center !important; border-bottom: 1px solid var(--header-border); }
        
        .vip-combo-card { background: linear-gradient(135deg, #1e3a8a, #2563eb); color: white; padding: 25px; border-radius: 15px; box-shadow: 0 4px 15px rgba(37,99,235,0.3); border: 2px solid #facc15; margin-bottom: 30px; width: 100%; box-sizing: border-box; }
        .lang-btn { cursor: pointer; border: none; background: none; font-size: 0.85rem; padding: 5px; }
    </style>
</head>
<body>
    <header>
        <div class="container header-inner">
            <a href="index.html" style="text-decoration:none; color:inherit; display:flex; align-items:center; gap:8px;">
                 <img src="betmetrics.png" alt="Logo" style="width:30px; height:30px;">
                 <span style="font-weight:900; font-size:1.2rem;">AI365PICK</span>
            </a>
            <nav class="nav-menu">
                <a href="index.html" class="nav-link" id="nav-home">Home</a>
                <a href="vip.html" class="nav-link active" id="nav-vip">VIP</a>
            </nav>
            <div style="display:flex; align-items:center; gap:10px;">
                <div class="language-switcher">
                    <button class="lang-btn" data-lang="ko" onclick="changeLang('ko')">KO</button>
                    <button class="lang-btn" data-lang="en" onclick="changeLang('en')">EN</button>
                </div>
                <button id="theme-toggle" style="background:none; border:none; cursor:pointer;">☀️</button>
            </div>
        </div>
    </header>

    <main class="container" style="padding-top: 20px;">
        <!-- 잠금 섹션 생략 (기존 코드와 동일) -->
        <section id="vip-unlocked-section" style="display: none;">
            <div id="notice-area"></div> <!-- 85% 부재 시 안내창이 뜰 곳 -->
            
            <h1 id="txt-vip-welcome" style="color: #2563eb; text-align:center; margin-bottom: 30px;">✅ VIP Member Zone</h1>
            
            <div id="vip-combo-display"></div>

            <div class="summary-card">
                <div class="summary-header">
                    <span id="txt-list-title">🔥 VIP High Probability Picks (80%+)</span>
                    <button style="background:white; color:#2563eb; border:none; padding:6px 12px; border-radius:6px; font-weight:bold; cursor:pointer; font-size: 0.8rem;" onclick="downloadExcel()" id="btn-download">📥 Download Excel</button>
                </div>
                <table class="summary-table">
                    <tbody id="vip-data-body"></tbody>
                </table>
            </div>

            <div style="text-align: center; margin: 30px 0;">
                <button onclick="logoutVip()" style="color: gray; background: none; border: none; text-decoration: underline; cursor: pointer; font-size: 0.9rem;">Logout</button>
            </div>
        </section>
    </main>

<script>
    const translations = {
        ko: {
            home: "홈", vip: "VIP",
            no85: "⚠️ 금일은 85% 이상 적중 예상픽이 없어 80% 이상의 고확률 픽으로 대체 제공됩니다.",
            hcapInfo: "(0핸디캡 추천)",
            vipWelcome: "✅ VIP 멤버 전용 구역", listTitle: "🔥 VIP 고확률 추천 (80%+)",
            comboTitle: "오늘의 AI VIP 추천 조합", totalOdds: "합산 배당률",
            download: "📥 엑셀 다운로드", sample: "표본", 
            homeWin: "홈승", draw: "무승부", awayWin: "원정승"
        },
        en: {
            home: "Home", vip: "VIP",
            no85: "⚠️ No picks over 85% today. Providing high-probability picks over 80% instead.",
            hcapInfo: "(0 Handicap Recommended)",
            vipWelcome: "✅ VIP Member Zone", listTitle: "🔥 VIP High Odds Picks (80%+)",
            comboTitle: "Today's AI VIP Combo", totalOdds: "Total Odds",
            download: "📥 Download Excel", sample: "Sample", 
            homeWin: "Home Win", draw: "Draw", awayWin: "Away Win"
        }
    };

    let currentLang = localStorage.getItem('lang') || 'ko';

    function changeLang(lang) {
        currentLang = lang;
        localStorage.setItem('lang', lang);
        updateUI();
        if (localStorage.getItem('isVipUser') === 'true') initVipPage();
    }

    function updateUI() {
        const t = translations[currentLang];
        document.getElementById('nav-home').innerText = t.home;
        document.getElementById('nav-vip').innerText = t.vip;
        if(document.getElementById('txt-vip-welcome')) document.getElementById('txt-vip-welcome').innerText = t.vipWelcome;
        if(document.getElementById('txt-list-title')) document.getElementById('txt-list-title').innerText = t.listTitle;
    }

    function translatePick(pickText) {
        const t = translations[currentLang];
        let result = pickText;
        if (pickText.includes("홈승")) result = t.homeWin;
        else if (pickText.includes("무승부")) result = t.draw;
        else if (pickText.includes("원정승")) result = result.replace("원정승", t.awayWin);
        
        // 원정승일 경우 핸디캡 추천 문구 결합
        if (pickText.includes("원정승")) {
            return `${result} <br><small style="color:#ef4444; font-size:0.75rem;">${t.hcapInfo}</small>`;
        }
        return result;
    }

    async function initVipPage() {
        const tbody = document.getElementById('vip-data-body');
        const comboDiv = document.getElementById('vip-combo-display');
        const noticeArea = document.getElementById('notice-area');
        const t = translations[currentLang];

        try {
            const response = await fetch('today_ai_all_picks.xlsx?v=' + Date.now());
            const arrayBuffer = await response.arrayBuffer();
            const workbook = XLSX.read(new Uint8Array(arrayBuffer), { type: 'array' });
            const jsonData = XLSX.utils.sheet_to_json(workbook.Sheets[workbook.SheetNames[0]]);

            // 1. 85% 존재 여부 확인
            const over85 = jsonData.filter(row => (parseFloat(row['예상확률']) || 0) >= 85);
            if (over85.length === 0) {
                noticeArea.innerHTML = `<div class="notice-banner">${t.no85}</div>`;
            } else {
                noticeArea.innerHTML = "";
            }

            // 2. 리스트는 80% 기준으로 필터링
            const vipMatches = jsonData.filter(row => (parseFloat(row['예상확률']) || 0) >= 80);
            
            // 조합 카드 및 테이블 렌더링 (동일 로직 생략, translatePick 호출 시 원정승 문구 자동 적용됨)
            let html = '';
            vipMatches.forEach(row => {
                html += `
                    <tr>
                        <td style="text-align:left !important; padding-left: 20px;">
                            <small style="color:gray; font-size:0.7rem; display:block; margin-bottom:3px;">${row['시간'] || ''}</small>
                            <div style="font-weight:bold;">${row['홈팀']} vs ${row['원정팀']}</div>
                        </td>
                        <td style="color:#2563eb; font-weight:bold; font-size:0.95rem;">${translatePick(row['AI추천'])}</td>
                        <td style="color:#059669; font-weight:bold;">${parseFloat(row['예상확률']).toFixed(1)}%</td>
                        <td><small style="color:#999;">${t.sample}: ${row['총경기수']}</small></td>
                    </tr>`;
            });
            tbody.innerHTML = html || '<tr><td colspan="4">No VIP data available.</td></tr>';
        } catch (e) { console.error(e); }
    }

    // 나머지 초기화 함수(checkStatus 등)는 기존과 동일하게 유지
    updateUI();
    if (localStorage.getItem('isVipUser') === 'true') {
        document.getElementById('vip-unlocked-section').style.display = 'block';
        initVipPage();
    }
</script>
</body>
</html>
