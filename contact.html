<!DOCTYPE html>
<html lang="ko" data-theme="light">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Contact Us - AI365PICK</title>
    <link rel="stylesheet" href="style.css">
    <script async src="https://pagead2.googlesyndication.com/pagead/js/adsbygoogle.js?client=ca-pub-4466358200851184" crossorigin="anonymous"></script>
    <style>
        .ads-placeholder { background: #f8fafc; border: 1px dashed #cbd5e1; margin: 20px 0; padding: 20px; text-align: center; color: #94a3b8; font-size: 0.8rem; border-radius: 8px; }
        .contact-box { text-align: center; padding: 40px 20px; background: var(--card-bg); border-radius: 15px; border: 1px solid #eee; box-shadow: 0 4px 6px rgba(0,0,0,0.05); }
        .email-link { font-size: 1.5rem; font-weight: bold; color: #2563eb; text-decoration: none; display: block; margin-top: 15px; }
        .email-link:hover { text-decoration: underline; }
    </style>
</head>
<body>
    <header>
        <div class="container" style="display:flex; justify-content:space-between; align-items:center; max-width:1200px; margin:0 auto; padding:15px 20px;">
            <a href="index.html" style="text-decoration:none; color:inherit; display:flex; align-items:center; gap:10px;">
                 <img src="betmetrics.png" alt="Logo" style="width:35px; height:35px;">
                 <span style="font-weight:bold; font-size:1.2rem;">AI365PICK</span>
            </a>
            <nav style="display:flex; gap:15px; font-weight:bold;">
                <a href="index.html" class="nav-link" data-i18n="navHome">Home</a>
                <a href="about.html" class="nav-link" data-i18n="navAbout">About</a>
                <a href="contact.html" class="nav-link active" data-i18n="navContact" style="color:#2563eb;">Contact</a>
                <a href="privacy.html" class="nav-link" data-i18n="navPrivacy">Privacy</a>
                <a href="vip.html" class="nav-link" data-i18n="navVip">VIP</a>
            </nav>
            <div class="header-controls" style="display:flex; align-items:center; gap:10px;">
                <div id="language-switcher">
                    <button class="lang-btn" data-lang="ko">KO</button>
                    <button class="lang-btn" data-lang="en">EN</button>
                </div>
                <button id="theme-toggle" style="background:none; border:none; cursor:pointer;">☀️</button>
            </div>
        </div>
    </header>

    <main class="container" style="max-width:800px; margin:0 auto; padding:40px 20px;">
        <section class="hero">
            <h1 id="txt-contact-title" data-i18n="contactTitle" style="text-align:center; font-size:2rem; margin-bottom:10px;">Contact Us</h1>
            
            <div class="ads-placeholder">ADVERTISEMENT</div>

            <div class="contact-box">
                <p id="txt-contact-desc" data-i18n="contactDesc" style="color:#64748b; font-size:1.1rem; line-height:1.6;">
                    If you have any questions or partnership inquiries, please contact us via email.
                </p>
                <a href="mailto:mgbgoal@naver.com" class="email-link">mgbgoal@naver.com</a>
                <p style="margin-top:20px; font-size:0.9rem; color:#94a3b8;">Average response time: Within 24 hours</p>
            </div>

            <div class="ads-placeholder" style="margin-top:30px;">ADVERTISEMENT</div>
        </section>
    </main>

    <footer>
        <div class="container" style="text-align: center; padding: 40px 0; color:#94a3b8;">
            <p>&copy; 2024 AI365PICK. All rights reserved.</p>
        </div>
    </footer>

    <script>
        const translations = {
            en: { 
                navHome: "Home", navAbout: "About", navContact: "Contact", navPrivacy: "Privacy", navVip: "VIP", 
                contactTitle: "Contact Us", 
                contactDesc: "If you have any questions or partnership inquiries, please contact us via email." 
            },
            ko: { 
                navHome: "홈", navAbout: "소개", navContact: "문의", navPrivacy: "개인정보", navVip: "VIP 전용", 
                contactTitle: "고객 문의", 
                contactDesc: "궁금하신 점이나 제휴 문의는 아래 이메일로 연락 주시기 바랍니다." 
            }
        };

        // 로컬 스토리지 키 이름을 다른 페이지(index, about 등)와 동일하게 'lang'으로 통일
        let currentLang = localStorage.getItem('lang') || 'ko';

        function updateLang(lang) {
            currentLang = lang;
            localStorage.setItem('lang', lang);
            
            const t = translations[lang];
            document.querySelectorAll('[data-i18n]').forEach(el => {
                const key = el.getAttribute('data-i18n');
                if (t[key]) el.innerText = t[key];
            });

            // 버튼 스타일 업데이트
            document.querySelectorAll('.lang-btn').forEach(btn => {
                btn.style.fontWeight = btn.dataset.lang === lang ? "bold" : "normal";
                btn.style.color = btn.dataset.lang === lang ? "#2563eb" : "#94a3b8";
            });
        }

        document.querySelectorAll('.lang-btn').forEach(btn => {
            btn.addEventListener('click', () => updateLang(btn.dataset.lang));
        });

        // 테마 로직
        const themeBtn = document.getElementById('theme-toggle');
        themeBtn.onclick = () => {
            const theme = document.documentElement.getAttribute('data-theme') === 'dark' ? 'light' : 'dark';
            document.documentElement.setAttribute('data-theme', theme);
            localStorage.setItem('theme', theme);
            themeBtn.innerText = theme === 'light' ? '☀️' : '🌙';
        };

        document.addEventListener('DOMContentLoaded', () => {
            updateLang(currentLang);
            const savedTheme = localStorage.getItem('theme') || 'light';
            document.documentElement.setAttribute('data-theme', savedTheme);
            themeBtn.innerText = savedTheme === 'light' ? '☀️' : '🌙';
        });
    </script>
</body>
</html>
