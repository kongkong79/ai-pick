<!DOCTYPE html>
<html lang="ko" data-theme="light">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Privacy Policy - AI365PICK</title>
    <link rel="stylesheet" href="style.css">
    <script async src="https://pagead2.googlesyndication.com/pagead/js/adsbygoogle.js?client=ca-pub-4466358200851184" crossorigin="anonymous"></script>
    <style>
        .privacy-container { background: var(--card-bg); border-radius: 15px; border: 1px solid #eee; padding: 40px; text-align: left; line-height: 1.8; }
        .privacy-container h3 { color: #2563eb; margin-top: 30px; border-left: 4px solid #2563eb; padding-left: 15px; }
        .effective-date { color: #94a3b8; font-weight: bold; margin-bottom: 20px; display: block; }
    </style>
</head>
<body>
    <header>
        <div class="container" style="display:flex; justify-content:space-between; align-items:center; max-width:1200px; margin:0 auto; padding:15px 20px;">
            <a href="index.html" style="text-decoration:none; color:inherit; display:flex; align-items:center; gap:10px;">
                 <img src="betmetrics.png" alt="Logo" style="width:35px; height:35px;">
                 <span style="font-weight:bold; font-size:1.2rem;">AI365PICK</span>
            </a>
            <nav style="display:flex; gap:15px; font-weight:bold;">
                <a href="index.html" class="nav-link" data-i18n="navHome">Home</a>
                <a href="about.html" class="nav-link" data-i18n="navAbout">About</a>
                <a href="contact.html" class="nav-link" data-i18n="navContact">Contact</a>
                <a href="privacy.html" class="nav-link active" data-i18n="navPrivacy" style="color:#2563eb;">Privacy</a>
                <a href="vip.html" class="nav-link" data-i18n="navVip">VIP</a>
            </nav>
            <div class="header-controls" style="display:flex; align-items:center; gap:10px;">
                <div id="language-switcher">
                    <button class="lang-btn" data-lang="ko">KO</button>
                    <button class="lang-btn" data-lang="en">EN</button>
                </div>
                <button id="theme-toggle" style="background:none; border:none; cursor:pointer;">☀️</button>
            </div>
        </div>
    </header>

    <main class="container" style="max-width:900px; margin:0 auto; padding:40px 20px;">
        <section class="hero">
            <h1 id="txt-privacy-title" data-i18n="privacyTitle" style="text-align:center; font-size:2rem; margin-bottom:30px;">Privacy Policy</h1>
            
            <div class="privacy-container">
                <span class="effective-date" id="txt-effective-date">Effective Date: December 20, 2024</span>
                <div id="privacy-content">
                    </div>
            </div>
        </section>
    </main>

    <footer>
        <div class="container" style="text-align: center; padding: 40px 0; color:#94a3b8;">
            <p>&copy; 2024 AI365PICK. All rights reserved.</p>
        </div>
    </footer>

    <script>
        const contentData = {
            en: `
                <p>At <strong>AI365PICK</strong>, accessible from ai365pick.com, one of our main priorities is the privacy of our visitors. This Privacy Policy document contains types of information that is collected and recorded by AI365PICK and how we use it.</p>
                <h3>1. Log Files and Analytics</h3>
                <p>AI365PICK follows a standard procedure of using log files. These files log visitors when they visit websites. The information collected by log files includes IP addresses, browser type, ISP, date/time stamp, and referring/exit pages. These are not linked to any information that is personally identifiable.</p>
                <h3>2. Google DoubleClick DART Cookie</h3>
                <p>Google is a third-party vendor on our site. It uses cookies, known as DART cookies, to serve ads to our site visitors based upon their visit to our site and other sites on the internet. Visitors may choose to decline the use of DART cookies by visiting the Google ad and content network Privacy Policy.</p>
                <h3>3. Advertising Partners</h3>
                <p>Third-party ad servers or ad networks uses technologies like cookies, JavaScript, or Web Beacons. They automatically receive your IP address when this occurs. These technologies are used to measure the effectiveness of their advertising campaigns.</p>
                <h3>4. Children's Information</h3>
                <p>We do not knowingly collect any Personal Identifiable Information from children under the age of 13. If you think that your child provided this kind of information on our website, please contact us immediately.</p>
            `,
            ko: `
                <p><strong>AI365PICK</strong>은 방문자의 개인정보 보호를 최우선으로 생각합니다. 본 개인정보 처리방침은 AI365PICK이 수집하고 기록하는 정보의 종류와 그 사용 방법을 담고 있습니다.</p>
                <h3>1. 로그 파일 및 분석</h3>
                <p>당사는 표준 절차에 따라 로그 파일을 사용합니다. 여기에는 IP 주소, 브라우저 유형, 인터넷 서비스 제공업체(ISP), 날짜 및 시간 스탬프 등이 포함됩니다. 이러한 정보는 개인을 식별할 수 있는 정보와 연동되지 않습니다.</p>
                <h3>2. Google DoubleClick DART 쿠키</h3>
                <p>구글은 당사 사이트의 제3자 제공업체입니다. 구글은 쿠키(DART 쿠키)를 사용하여 방문자의 방문 기록을 바탕으로 광고를 제공합니다. 방문자는 구글의 광고 및 콘텐츠 네트워크 개인정보 보호정책을 방문하여 DART 쿠키 사용을 거부할 수 있습니다.</p>
                <h3>3. 광고 파트너 정책</h3>
                <p>제3자 광고 서버 또는 네트워크는 쿠키, 자바스크립트 또는 웹 비콘과 같은 기술을 사용합니다. 광고가 노출될 때 자동으로 귀하의 IP 주소를 수신하게 됩니다. 이러한 기술은 광고 캠페인의 효과를 측정하거나 광고 콘텐츠를 개인화하는 데 사용됩니다.</p>
                <h3>4. 아동 정보 보호</h3>
                <p>당사는 13세 미만 아동으로부터 어떠한 개인 식별 정보를 고의로 수집하지 않습니다. 만약 아동이 이러한 정보를 제공했다고 판단되시면 즉시 당사로 연락해 주시기 바랍니다.</p>
            `
        };

        const navTranslations = {
            en: { navHome: "Home", navAbout: "About", navContact: "Contact", navPrivacy: "Privacy", navVip: "VIP", privacyTitle: "Privacy Policy", date: "Effective Date: December 20, 2024" },
            ko: { navHome: "홈", navAbout: "소개", navContact: "문의", navPrivacy: "개인정보", navVip: "VIP 전용", privacyTitle: "개인정보 처리방침", date: "시행일: 2024년 12월 20일" }
        };

        let currentLang = localStorage.getItem('lang') || 'ko';

        function updateLang(lang) {
            currentLang = lang;
            localStorage.setItem('lang', lang);
            
            const t = navTranslations[lang];
            document.querySelectorAll('[data-i18n]').forEach(el => {
                const key = el.getAttribute('data-i18n');
                if (t[key]) el.innerText = t[key];
            });

            document.getElementById('txt-effective-date').innerText = t.date;
            document.getElementById('privacy-content').innerHTML = contentData[lang];

            document.querySelectorAll('.lang-btn').forEach(btn => {
                btn.style.fontWeight = btn.dataset.lang === lang ? "bold" : "normal";
                btn.style.color = btn.dataset.lang === lang ? "#2563eb" : "#94a3b8";
            });
        }

        document.querySelectorAll('.lang-btn').forEach(btn => {
            btn.addEventListener('click', () => updateLang(btn.dataset.lang));
        });

        const themeBtn = document.getElementById('theme-toggle');
        themeBtn.onclick = () => {
            const theme = document.documentElement.getAttribute('data-theme') === 'dark' ? 'light' : 'dark';
            document.documentElement.setAttribute('data-theme', theme);
            localStorage.setItem('theme', theme);
            themeBtn.innerText = theme === 'light' ? '☀️' : '🌙';
        };

        document.addEventListener('DOMContentLoaded', () => {
            updateLang(currentLang);
            const savedTheme = localStorage.getItem('theme') || 'light';
            document.documentElement.setAttribute('data-theme', savedTheme);
            themeBtn.innerText = savedTheme === 'light' ? '☀️' : '🌙';
        });
    </script>
</body>
</html>
