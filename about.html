<!DOCTYPE html>
<html lang="ko" data-theme="light">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>About Us - AI365PICK</title>
    <link rel="stylesheet" href="style.css">
    <script async src="https://pagead2.googlesyndication.com/pagead/js/adsbygoogle.js?client=ca-pub-4466358200851184" crossorigin="anonymous"></script>
    <style>
        .ads-placeholder { background: #f8fafc; border: 1px dashed #cbd5e1; margin: 20px 0; padding: 20px; text-align: center; color: #94a3b8; font-size: 0.8rem; border-radius: 8px; }
        .hero h2 { margin-bottom: 30px; }
    </style>
</head>
<body>
    <header>
        <div class="container" style="display:flex; justify-content:space-between; align-items:center;">
            <a href="index.html" class="logo-link" style="text-decoration:none; color:inherit; display:flex; align-items:center; gap:10px;">
                 <img src="betmetrics.png" alt="Logo" style="width:35px; height:35px;">
                 <div class="logo-text-group">
                     <span class="logo-main-text" style="font-weight:bold; font-size:1.2rem;">AI365PICK</span>
                 </div>
            </a>
            <nav style="display:flex; gap:15px; font-weight:bold;">
                <a href="index.html" class="nav-link" data-i18n="navHome">Home</a>
                <a href="about.html" class="nav-link active" data-i18n="navAbout" style="color:#2563eb;">About</a>
                <a href="contact.html" class="nav-link" data-i18n="navContact">Contact</a>
                <a href="privacy.html" class="nav-link" data-i18n="navPrivacy">Privacy</a>
                <a href="vip.html" class="nav-link" data-i18n="navVip">VIP</a>
            </nav>
            <div class="header-controls" style="display:flex; gap:10px;">
                <div id="language-switcher">
                    <button class="lang-btn" data-lang="ko">KO</button>
                    <button class="lang-btn" data-lang="en">EN</button>
                </div>
                <button id="theme-toggle" style="background:none; border:none; cursor:pointer;">☀️</button>
            </div>
        </div>
    </header>

    <main class="container" style="max-width:800px; margin:0 auto; padding:40px 20px;">
        <section class="hero">
            <h2 id="txt-about-title" data-i18n="aboutTitle" style="text-align:center; font-size:2rem;">About AI365PICK Analysis</h2>
            
            <div class="ads-placeholder">ADVERTISEMENT</div>

            <div class="analysis-list-item" style="text-align: left; line-height: 1.8; padding: 30px; background:var(--card-bg); border-radius:15px; border:1px solid #eee;">
                <div id="about-content">
                    </div>
            </div>

            <div class="ads-placeholder">ADVERTISEMENT</div>
        </section>
    </main>

    <footer>
        <div class="container" style="text-align: center; padding: 30px 0; color:#94a3b8;">
            <p>&copy; 2024 AI365PICK. All rights reserved.</p>
        </div>
    </footer>

    <script>
        const contentData = {
            en: `
                <p><strong>AI365PICK</strong> provides real-time, data-driven sports analysis powered by advanced artificial intelligence. Our system operates 365 days a year to deliver high-accuracy statistical insights for major sports leagues worldwide.</p>
                <h3 style="margin-top:20px; color:#2563eb;">Precision Through Data</h3>
                <p>Our core algorithm analyzes over a decade of historical match data, player performance metrics, and team dynamics. By eliminating human emotional bias, AI365PICK focuses on objective probability and statistical significance.</p>
                <h3 style="margin-top:20px; color:#2563eb;">Reliable Methodology</h3>
                <p>Every "Pick" generated by our AI is cross-referenced with thousands of similar historical scenarios. We prioritize sample size and consistency, ensuring mathematically verified analysis.</p>
                <p style="margin-top:20px; color:#94a3b8; font-size: 0.85rem;">Disclaimer: AI365PICK is a sports information platform. We do not provide gambling services. All data is for informational purposes only.</p>
            `,
            ko: `
                <p><strong>AI365PICK</strong>은 고급 인공지능을 기반으로 한 실시간 스포츠 데이터 분석 서비스를 제공합니다. 저희 시스템은 전 세계 주요 스포츠 리그에 대해 높은 정확도의 통계적 통찰력을 제공하기 위해 365일 가동됩니다.</p>
                <h3 style="margin-top:20px; color:#2563eb;">데이터를 통한 정밀도</h3>
                <p>저희 알고리즘은 10년 이상의 과거 경기 데이터, 선수 성적 지표 및 팀 동향을 분석합니다. 감정적 편향을 배제함으로써 AI365PICK은 객관적인 확률에 집중하여 사용자가 경기 흐름을 더 효과적으로 파악할 수 있도록 돕습니다.</p>
                <h3 style="margin-top:20px; color:#2563eb;">신뢰할 수 있는 방법론</h3>
                <p>AI가 생성하는 모든 분석은 수천 개의 유사한 과거 시나리오와 교차 검증됩니다. 표본 크기와 일관성을 우선시하여 수학적으로 검증된 데이터를 제공합니다.</p>
                <p style="margin-top:20px; color:#94a3b8; font-size: 0.85rem;">주의사항: AI365PICK은 스포츠 정보 제공 플랫폼입니다. 저희는 도박 서비스를 제공하지 않으며, 모든 데이터는 정보 제공 및 교육 목적으로만 사용됩니다.</p>
            `
        };

        const navTranslations = {
            en: { navHome: "Home", navAbout: "About", navContact: "Contact", navPrivacy: "Privacy", navVip: "VIP", aboutTitle: "About AI365PICK Analysis" },
            ko: { navHome: "홈", navAbout: "소개", navContact: "문의", navPrivacy: "개인정보", navVip: "VIP 전용", aboutTitle: "AI365PICK 인공지능 분석 소개" }
        };

        let currentLang = localStorage.getItem('lang') || 'ko';

        function updateLang(lang) {
            currentLang = lang;
            localStorage.setItem('lang', lang);
            
            // 네비게이션 및 제목 변경
            const t = navTranslations[lang];
            document.querySelectorAll('[data-i18n]').forEach(el => {
                const key = el.getAttribute('data-i18n');
                if (t[key]) el.innerText = t[key];
            });

            // 본문 내용 변경
            document.getElementById('about-content').innerHTML = contentData[lang];

            // 버튼 스타일
            document.querySelectorAll('.lang-btn').forEach(btn => {
                btn.style.fontWeight = btn.dataset.lang === lang ? "bold" : "normal";
                btn.style.color = btn.dataset.lang === lang ? "#2563eb" : "#94a3b8";
            });
        }

        document.querySelectorAll('.lang-btn').forEach(btn => {
            btn.addEventListener('click', () => updateLang(btn.dataset.lang));
        });

        // 테마 설정
        const themeBtn = document.getElementById('theme-toggle');
        themeBtn.onclick = () => {
            const theme = document.documentElement.getAttribute('data-theme') === 'dark' ? 'light' : 'dark';
            document.documentElement.setAttribute('data-theme', theme);
            localStorage.setItem('theme', theme);
            themeBtn.innerText = theme === 'light' ? '☀️' : '🌙';
        };

        // 초기 로드
        document.addEventListener('DOMContentLoaded', () => {
            updateLang(currentLang);
            const savedTheme = localStorage.getItem('theme') || 'light';
            document.documentElement.setAttribute('data-theme', savedTheme);
            themeBtn.innerText = savedTheme === 'light' ? '☀️' : '🌙';
        });
    </script>
</body>
</html>
